<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>VoidCraft</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  overflow: hidden; 
  background: #000; 
  font-family: 'Courier New', monospace;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; touch-action: none; }
#ui-overlay {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #8af;
  font-size: 12px;
  pointer-events: none;
  text-shadow: 0 0 10px #000;
  z-index: 100;
  max-width: calc(100vw - 120px);
}
#ui-overlay div { margin: 4px 0; }
.resource-bar { 
  display: inline-block; 
  width: 60px; 
  height: 8px; 
  background: #1a1a2e; 
  border: 1px solid #334;
  margin-left: 5px;
  vertical-align: middle;
}
.resource-fill {
  height: 100%;
  transition: width 0.3s;
}
#tooltip {
  position: fixed;
  bottom: 60px;
  left: 10px;
  color: #adf;
  font-size: 11px;
  pointer-events: none;
  text-shadow: 0 0 10px #000;
  z-index: 100;
  max-width: 280px;
}
#wave-info {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #fa8;
  font-size: 14px;
  pointer-events: none;
  text-shadow: 0 0 10px #000;
  z-index: 100;
}
#mobile-controls {
  position: fixed;
  bottom: 10px;
  right: 10px;
  z-index: 150;
  display: none;
}
#restart-btn {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px 40px;
  font-size: 20px;
  font-family: 'Courier New', monospace;
  background: linear-gradient(180deg, #2a3a5a, #1a2a4a);
  color: #adf;
  border: 2px solid #4af;
  border-radius: 8px;
  cursor: pointer;
  z-index: 200;
  touch-action: manipulation;
}
#restart-btn:hover, #restart-btn:active {
  background: linear-gradient(180deg, #3a4a6a, #2a3a5a);
  border-color: #8af;
}
#game-over-text {
  display: none;
  position: fixed;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  color: #f55;
  text-shadow: 0 0 20px #f00;
  z-index: 200;
  font-weight: bold;
  text-align: center;
}
#final-score {
  display: none;
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  color: #adf;
  z-index: 200;
}

/* Mobile-specific styles */
@media (max-width: 768px) {
  #ui-overlay { font-size: 11px; }
  #tooltip { font-size: 10px; bottom: 80px; }
  #wave-info { font-size: 12px; }
  #game-over-text { font-size: 28px; }
  #restart-btn { padding: 15px 30px; font-size: 16px; }
}

@media (max-width: 480px) {
  #ui-overlay { font-size: 10px; max-width: calc(100vw - 80px); }
  #game-over-text { font-size: 22px; }
}
</style>
</head>

// ============================================================================
// SHADERS
// ============================================================================

const vsSource = `#version 300 es
in vec2 aPos;
in vec3 aCol;
out vec3 vCol;
uniform vec2 uRes;
void main() {
 vec2 pos = aPos / uRes * 2.0 - 1.0;
 pos.y = -pos.y;
 gl_Position = vec4(pos, 0.0, 1.0);
 vCol = aCol;
}`;

const fsSource = `#version 300 es
precision highp float;
in vec3 vCol;
out vec4 FragColor;
void main() { FragColor = vec4(vCol, 1.0); }`;

const vsAtom = `#version 300 es
in vec2 aPos;
in float aVal;
out float vVal;
uniform vec2 uRes;
void main() {
 vec2 pos = aPos / uRes * 2.0 - 1.0;
 pos.y = -pos.y;
 gl_Position = vec4(pos, 0.0, 1.0);
 vVal = aVal;
}`;

const fsAtom = `#version 300 es
precision highp float;
in float vVal;
out vec4 FragColor;
void main() { FragColor = vec4(vec3(vVal * 0.18), 1.0); }`;

function createShader(type, source) {
 const s = gl.createShader(type);
 gl.shaderSource(s, source);
 gl.compileShader(s);
 return s;
}

function createProgram(vs, fs) {
 const p = gl.createProgram();
 gl.attachShader(p, createShader(gl.VERTEX_SHADER, vs));
 gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fs));
 gl.linkProgram(p);
 return p;
}

const prog = createProgram(vsSource, fsSource);
const progAtom = createProgram(vsAtom, fsAtom);

const uRes = gl.getUniformLocation(prog, 'uRes');
const uResAtom = gl.getUniformLocation(progAtom, 'uRes');
const aPos = gl.getAttribLocation(prog, 'aPos');
const aCol = gl.getAttribLocation(prog, 'aCol');
const aPosAtom = gl.getAttribLocation(progAtom, 'aPos');
const aValAtom = gl.getAttribLocation(progAtom, 'aVal');

const posBuf = gl.createBuffer();
const colBuf = gl.createBuffer();
const atomPosBuf = gl.createBuffer();
const atomValBuf = gl.createBuffer();

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
gl.enableVertexAttribArray(aCol);
gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);

const vaoAtom = gl.createVertexArray();
gl.bindVertexArray(vaoAtom);
gl.bindBuffer(gl.ARRAY_BUFFER, atomPosBuf);
gl.enableVertexAttribArray(aPosAtom);
gl.vertexAttribPointer(aPosAtom, 2, gl.FLOAT, false, 0, 0);
gl.bindBuffer(gl.ARRAY_BUFFER, atomValBuf);
gl.enableVertexAttribArray(aValAtom);
gl.vertexAttribPointer(aValAtom, 1, gl.FLOAT, false, 0, 0);

gl.bindVertexArray(null);

const ATOM_COLORS = { C: 57, H: 56, O: 40, N: 32, Fe: 24, Si: 58, Cu: 20 };

// Atom grid
const GRID_SIZE = 10;
let GRID_W = Math.ceil(W / GRID_SIZE);
let GRID_H = Math.ceil(H / GRID_SIZE);
let atomGrid = new Float32Array(GRID_W * GRID_H);

function initAtomGrid() {
 for (let i = 0; i < atomGrid.length; i++) atomGrid[i] = Math.random() * 0.08;
}

// UI
let uiBlocks = [];
let draggingBlock = null;
let mouseX = 0, mouseY = 0;
let hoveredUI = null;
let touchActive = false;

function initUIBlocks() {
 uiBlocks = [];
 let y = 15;
 const order = ['hull', 'energy', 'storage', 'canon', 'laser', 'radar', 'collector'];
 const blockHeight = isMobile ? 52 : 75;
 const spacing = isMobile ? 58 : 82;
 
 for (const type of order) {
  if (type === 'core') continue;
  const def = BLOCK_TYPES[type];
  uiBlocks.push({ 
   type, 
   x: W - SIDEBAR_W + 4, 
   y, 
   w: SIDEBAR_W - 8, 
   h: blockHeight,
   name: def.name
  });
  y += spacing;
 }
}

function initCore() {
 const cx = (W - SIDEBAR_W) / 2;
 const cy = H / 2;
 blocks.push({
  type: 'core',
  x: cx,
  y: cy,
  hp: BLOCK_TYPES.core.hp,
  maxHp: BLOCK_TYPES.core.hp,
  operational: true,
  powered: true,
  poweredBy: null,
  cooldown: 0,
  defenseCooldown: 0,
  rotation: 0,
  animOffset: Math.random() * 100,
  stored: 0,
  animPulse: 0
 });
}

// ============================================================================
// INPUT HANDLERS - MOUSE
// ============================================================================

canvas.addEventListener('mousemove', (e) => {
 mouseX = e.clientX;
 mouseY = e.clientY;
 
 // Check hover on UI blocks
 hoveredUI = null;
 for (const ui of uiBlocks) {
  if (mouseX >= ui.x && mouseX <= ui.x + ui.w && mouseY >= ui.y && mouseY <= ui.y + ui.h) {
   hoveredUI = ui;
   break;
  }
 }
 
 if (draggingBlock) {
  draggingBlock.x = mouseX;
  draggingBlock.y = mouseY;
  updateDragPreview();
 }
 
 updateTooltip();
});

canvas.addEventListener('mousedown', (e) => {
 const mx = e.clientX;
 const my = e.clientY;
 for (const ui of uiBlocks) {
  if (mx >= ui.x && mx <= ui.x + ui.w && my >= ui.y && my <= ui.y + ui.h) {
   draggingBlock = { 
    type: ui.type, 
    x: mx, 
    y: my,
    canPlace: false,
    willHavePower: false,
    needsMoreEnergy: false,
    nearestBlock: null
   };
   updateDragPreview();
   return;
  }
 }
});

canvas.addEventListener('mouseup', () => {
 if (draggingBlock && draggingBlock.canPlace) {
  placeBlock(draggingBlock.type, draggingBlock.x, draggingBlock.y);
 }
 draggingBlock = null;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ============================================================================
// INPUT HANDLERS - TOUCH
// ============================================================================

canvas.addEventListener('touchstart', (e) => {
 e.preventDefault();
 if (e.touches.length === 0) return;
 
 const touch = e.touches[0];
 const tx = touch.clientX;
 const ty = touch.clientY;
 
 touchActive = true;
 mouseX = tx;
 mouseY = ty;
 
 // Check if touching a UI block
 for (const ui of uiBlocks) {
  if (tx >= ui.x && tx <= ui.x + ui.w && ty >= ui.y && ty <= ui.y + ui.h) {
   hoveredUI = ui;
   draggingBlock = { 
    type: ui.type, 
    x: tx, 
    y: ty,
    canPlace: false,
    willHavePower: false,
    needsMoreEnergy: false,
    nearestBlock: null
   };
   updateDragPreview();
   updateTooltip();
   return;
  }
 }
 
 hoveredUI = null;
 updateTooltip();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
 e.preventDefault();
 if (e.touches.length === 0) return;
 
 const touch = e.touches[0];
 mouseX = touch.clientX;
 mouseY = touch.clientY;
 
 if (draggingBlock) {
  draggingBlock.x = mouseX;
  draggingBlock.y = mouseY;
  updateDragPreview();
  updateTooltip();
 }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
 e.preventDefault();
 
 if (draggingBlock && draggingBlock.canPlace) {
  placeBlock(draggingBlock.type, draggingBlock.x, draggingBlock.y);
 }
 
 draggingBlock = null;
 touchActive = false;
 hoveredUI = null;
 updateTooltip();
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
 e.preventDefault();
 draggingBlock = null;
 touchActive = false;
 hoveredUI = null;
 updateTooltip();
}, { passive: false });

// ============================================================================
// TOOLTIP
// ============================================================================

function updateTooltip() {
 const tooltip = document.getElementById('tooltip');
 if (hoveredUI && !draggingBlock) {
  const def = BLOCK_TYPES[hoveredUI.type];
  const cost = Math.floor(def.squares.length * 2.5);
  tooltip.innerHTML = `<b>${def.name}</b><br>${def.desc}<br><span style="color:#fd8">Cost: ~${cost} atoms</span>`;
 } else if (draggingBlock) {
  const def = BLOCK_TYPES[draggingBlock.type];
  let msg = `<b>${def.name}</b><br>`;
  if (!draggingBlock.canPlace) {
   msg += '<span style="color:#f55">Too far from ship!</span>';
  } else if (draggingBlock.needsMoreEnergy) {
   msg += '<span style="color:#fa5">Needs power! Build a Reactor nearby.</span>';
  } else {
   msg += '<span style="color:#5f8">Release to place</span>';
  }
  tooltip.innerHTML = msg;
 } else {
  tooltip.innerHTML = isMobile ? '<span style="color:#888">Drag modules from sidebar to build</span>' : '';
 }
}

function updateDragPreview() {
 if (!draggingBlock) return;
 
 const def = BLOCK_TYPES[draggingBlock.type];
 const cost = Math.floor(def.squares.length * 2.5);
 
 // Check resources
 let totalRes = 0;
 for (const r in resources) totalRes += resources[r];
 const canAfford = totalRes >= cost;
 
 // Find nearest existing block (expanded range for larger ships)
 let nearestBlock = null;
 let nearestDist = Infinity;
 for (const b of blocks) {
  const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
  if (d < nearestDist) {
   nearestDist = d;
   nearestBlock = b;
  }
 }
 
 // Much more generous placement range
 const placementRange = 350;
 const inRange = nearestBlock && nearestDist <= placementRange;
 draggingBlock.canPlace = canAfford && inRange;
 draggingBlock.nearestBlock = nearestBlock;
 
 // Check power availability
 if (nearestBlock && draggingBlock.canPlace) {
  if (def.energyCost === 0) {
   draggingBlock.willHavePower = true;
   draggingBlock.needsMoreEnergy = false;
  } else {
   let availablePower = 0;
   for (const b of blocks) {
    if (b.type === 'energy' || b.type === 'core') {
     const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
     const powerRange = BLOCK_TYPES[b.type].powerRange || 200;
     if (d < powerRange) {
      availablePower += BLOCK_TYPES[b.type].energyProduce;
     }
    }
   }
   
   let currentNeeds = 0;
   for (const b of blocks) {
    const need = BLOCK_TYPES[b.type].energyCost;
    if (need > 0) {
     const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
     if (d < 250) {
      currentNeeds += need;
     }
    }
   }
   
   const totalNeeds = currentNeeds + def.energyCost;
   draggingBlock.willHavePower = availablePower >= totalNeeds;
   draggingBlock.needsMoreEnergy = !draggingBlock.willHavePower;
  }
 }
}

function placeBlock(type, x, y) {
 const def = BLOCK_TYPES[type];
 const cost = Math.floor(def.squares.length * 2.5);
 
 let totalRes = 0;
 for (const r in resources) totalRes += resources[r];
 if (totalRes < cost) return;
 
 let nearestBlock = null;
 let nearestDist = Infinity;
 for (const b of blocks) {
  const d = Math.hypot(b.x - x, b.y - y);
  if (d < nearestDist) {
   nearestDist = d;
   nearestBlock = b;
  }
 }
 
 if (!nearestBlock || nearestDist > 350) return;
 
 // Deduct resources proportionally
 const each = Math.ceil(cost / Object.keys(resources).length);
 for (const r in resources) resources[r] = Math.max(0, resources[r] - each);
 
 const rotation = Math.floor(Math.random() * 4);
 
 blocks.push({
  type, x, y,
  hp: def.hp,
  maxHp: def.hp,
  operational: false,
  powered: false,
  poweredBy: null,
  cooldown: 0,
  defenseCooldown: 0,
  rotation,
  animOffset: Math.random() * 100,
  drones: [],
  droneCount: 0,
  stored: 0,
  animPulse: 0
 });
 
 createBridge(blocks[blocks.length - 1], nearestBlock);
}

function createBridge(b1, b2) {
 const dx = b2.x - b1.x;
 const dy = b2.y - b1.y;
 const dist = Math.hypot(dx, dy);
 const steps = Math.floor(dist / (B * 2.5));
 
 const bridgeSquares = [];
 for (let i = 1; i < steps; i++) {
  const t = i / steps;
  bridgeSquares.push({
   x: b1.x + dx * t,
   y: b1.y + dy * t,
   c: i % 2 === 0 ? 60 : 62,
   phase: Math.random() * Math.PI * 2
  });
 }
 
 bridges.push({ from: b1, to: b2, squares: bridgeSquares });
}

function rotateCoord(x, y, rotation) {
 for (let i = 0; i < rotation; i++) [x, y] = [y, -x];
 return [x, y];
}

// ============================================================================
// WAVE SPAWNING
// ============================================================================

function spawnWave(size) {
 const config = WAVE_CONFIG[size];
 const count = config.count[0] + Math.floor(Math.random() * (config.count[1] - config.count[0]));
 
 for (let i = 0; i < count; i++) {
  setTimeout(() => spawnAlien(config.strength), i * (80 + Math.random() * 40));
 }
 
 waveCount[size]++;
}

function spawnAlien(strength) {
 const edge = Math.floor(Math.random() * 4);
 let x, y;
 const playW = W - SIDEBAR_W;
 const margin = 80;
 
 switch(edge) {
  case 0: x = margin; y = Math.random() * H; break;
  case 1: x = playW - margin; y = Math.random() * H; break;
  case 2: x = Math.random() * playW; y = margin; break;
  default: x = Math.random() * playW; y = H - margin; break;
 }
 
 const hpMult = [20, 60, 140, 320][strength - 1];
 const dmgMult = [5, 12, 28, 60][strength - 1];
 const sizeMult = [1, 1.5, 2.4, 4][strength - 1];
 
 let target = null;
 let minDist = Infinity;
 for (const b of blocks) {
  const d = Math.hypot(b.x - x, b.y - y);
  if (b.type === 'core' && d < 800) { target = b; break; }
  if (d < minDist) { minDist = d; target = b; }
 }
 
 aliens.push({
  x, y, strength,
  size: sizeMult,
  hp: hpMult * (0.8 + Math.random() * 0.4),
  maxHp: hpMult,
  damage: dmgMult,
  speed: 0.35 + Math.random() * 0.25,
  target,
  attackCooldown: 0,
  phase: Math.random() * Math.PI * 2
 });
}

// ============================================================================
// GAME UPDATE
// ============================================================================

function update() {
 if (gameOver || isPaused) return;
 
 gameTime++;
 
 // Wave spawning - more forgiving early game
 const difficultyMod = Math.min(2, 1 + gameTime / 50000);
 for (const size in waveTimers) {
  waveTimers[size]--;
  const spawnChance = (1 / WAVE_CONFIG[size].avgInterval) * difficultyMod;
  if (waveTimers[size] <= 0 || Math.random() < spawnChance) {
   spawnWave(size);
   waveTimers[size] = WAVE_CONFIG[size].avgInterval * (0.5 + Math.random());
  }
 }
 
 // Atom grid decay
 for (let i = 0; i < atomGrid.length; i++) {
  atomGrid[i] *= 0.992;
  if (Math.random() < 0.0003) atomGrid[i] = Math.min(1, atomGrid[i] + 0.12);
 }
 
 // ========== POWER SYSTEM ==========
 for (const b of blocks) {
  b.powered = (b.type === 'core') || (b.type === 'energy') || (b.type === 'hull');
  b.poweredBy = null;
 }
 
 const powerSources = blocks.filter(b => b.type === 'energy' || b.type === 'core');
 
 for (const source of powerSources) {
  const sourceDef = BLOCK_TYPES[source.type];
  const powerRange = sourceDef.powerRange || 200;
  const maxPowered = sourceDef.maxPowered || 3;
  
  const nearby = [];
  for (const b of blocks) {
   if (b === source) continue;
   if (b.powered) continue;
   if (BLOCK_TYPES[b.type].energyCost === 0) continue;
   
   const d = Math.hypot(b.x - source.x, b.y - source.y);
   if (d < powerRange) {
    nearby.push({ block: b, dist: d });
   }
  }
  
  nearby.sort((a, b) => a.dist - b.dist);
  
  let powered = 0;
  for (const { block: b } of nearby) {
   if (powered >= maxPowered) break;
   b.powered = true;
   b.poweredBy = source;
   powered++;
  }
 }
 
 for (const b of blocks) {
  const def = BLOCK_TYPES[b.type];
  if (def.energyCost === 0) {
   b.operational = true;
  } else {
   b.operational = b.powered;
  }
  
  // Initialize animPulse if undefined
  if (b.animPulse === undefined) b.animPulse = 0;
 }
 
 // ========== UPDATE BLOCKS ==========
 for (const b of blocks) {
  const def = BLOCK_TYPES[b.type];
  
  // Core defense
  if (b.type === 'core') {
   b.defenseCooldown = Math.max(0, b.defenseCooldown - 1);
   
   if (b.defenseCooldown <= 0) {
    let closest = null;
    let minD = def.defenseRange;
    
    for (const a of aliens) {
     const d = Math.hypot(a.x - b.x, a.y - b.y);
     if (d < minD && a.strength <= 2) {
      minD = d;
      closest = a;
     }
    }
    
    if (closest) {
     const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
     projectiles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * 8,
      vy: Math.sin(angle) * 8,
      damage: def.defenseDamage,
      color: 12,
      life: 120
     });
     b.defenseCooldown = def.defenseCooldown;
     b.animPulse = 1;
    }
   }
  }
  
  // Canon firing
  if (b.type === 'canon' && b.operational) {
   b.cooldown = Math.max(0, b.cooldown - 1);
   
   if (b.cooldown <= 0) {
    let closest = null;
    let minD = def.range;
    
    for (const a of aliens) {
     const d = Math.hypot(a.x - b.x, a.y - b.y);
     if (d < minD) {
      minD = d;
      closest = a;
     }
    }
    
    if (closest) {
     const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
     projectiles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * 12,
      vy: Math.sin(angle) * 12,
      damage: def.damage,
      color: 28,
      life: 150
     });
     b.cooldown = def.cooldown;
     b.animPulse = 1;
    }
   }
  }
  
  // Laser firing
  if (b.type === 'laser' && b.operational) {
   b.cooldown = Math.max(0, b.cooldown - 1);
   
   if (b.cooldown <= 0) {
    let closest = null;
    let minD = def.range;
    
    for (const a of aliens) {
     const d = Math.hypot(a.x - b.x, a.y - b.y);
     if (d < minD) {
      minD = d;
      closest = a;
     }
    }
    
    if (closest) {
     closest.hp -= def.damage;
     b.laserTarget = closest;
     b.animPulse = 1;
    }
    
    b.cooldown = def.cooldown;
   }
  }
  
  // Radar animation
  if (b.type === 'radar' && b.operational) {
   b.animPulse = 0.5 + 0.5 * Math.sin(gameTime * 0.05 + b.animOffset);
  }
  
  // Collector drone spawning - more active
  if (b.type === 'collector' && b.operational) {
   if (b.droneCount < (def.droneMax || 6) && Math.random() < 0.025) {
    drones.push({
     owner: b,
     x: b.x, y: b.y,
     state: 'seeking',
     target: null,
     cargo: 0,
     cargoType: null,
     homeX: b.x,
     homeY: b.y
    });
    b.droneCount++;
   }
   b.animPulse = 0.2;
  }
  
  // Energy glow
  if (b.type === 'energy') {
   b.animPulse = 0.6 + 0.4 * Math.sin(gameTime * 0.06 + b.animOffset);
  }
  
  // Core glow
  if (b.type === 'core') {
   b.animPulse = 0.4 + 0.3 * Math.sin(gameTime * 0.04);
  }
  
  b.animPulse = Math.max(0, (b.animPulse || 0) - 0.02);
 }
 
 // ========== UPDATE DRONES ==========
 for (const d of drones) {
  if (!blocks.includes(d.owner)) { d.dead = true; continue; }
  
  d.homeX = d.owner.x;
  d.homeY = d.owner.y;
  
  if (d.state === 'seeking') {
   if (!d.target || d.target.collected) {
    let nearest = null;
    let minD = 500;
    for (const a of atoms) {
     if (a.collected) continue;
     const dist = Math.hypot(a.x - d.x, a.y - d.y);
     if (dist < minD) { minD = dist; nearest = a; }
    }
    d.target = nearest;
   }
   
   if (d.target && !d.target.collected) {
    const angle = Math.atan2(d.target.y - d.y, d.target.x - d.x);
    d.x += Math.cos(angle) * 3;
    d.y += Math.sin(angle) * 3;
    
    if (Math.hypot(d.target.x - d.x, d.target.y - d.y) < 15) {
     d.cargo = d.target.amount;
     d.cargoType = d.target.type;
     d.target.collected = true;
     d.target = null;
     d.state = 'returning';
    }
   } else {
    const angle = Math.atan2(d.homeY - d.y, d.homeX - d.x);
    d.x += Math.cos(angle) * 0.8;
    d.y += Math.sin(angle) * 0.8;
   }
  }
   
  if (d.state === 'returning') {
   const angle = Math.atan2(d.homeY - d.y, d.homeX - d.x);
   d.x += Math.cos(angle) * 3.5;
   d.y += Math.sin(angle) * 3.5;
   
   if (Math.hypot(d.homeX - d.x, d.homeY - d.y) < 25) {
    let storage = null;
    for (const b of blocks) {
     if (b.type === 'storage' && b.operational) {
      if (!storage || Math.hypot(b.x - d.homeX, b.y - d.homeY) < Math.hypot(storage.x - d.homeX, storage.y - d.homeY)) {
       storage = b;
      }
     }
    }
    
    if (storage) {
     storage.stored = Math.min((storage.stored || 0) + d.cargo, BLOCK_TYPES.storage.capacity);
    } else {
     resources[d.cargoType] = (resources[d.cargoType] || 0) + d.cargo;
    }
    
    d.cargo = 0;
    d.cargoType = null;
    d.state = 'seeking';
    if (d.owner) d.owner.animPulse = 1;
   }
  }
 }
 
 drones = drones.filter(d => !d.dead);
 atoms = atoms.filter(a => !a.collected);
 
 // ========== UPDATE ALIENS ==========
 for (const a of aliens) {
  if (a.target && blocks.includes(a.target)) {
   const angle = Math.atan2(a.target.y - a.y, a.target.x - a.x);
   a.x += Math.cos(angle) * a.speed;
   a.y += Math.sin(angle) * a.speed;
   
   if (Math.hypot(a.target.x - a.x, a.target.y - a.y) < 25) {
    a.attackCooldown = Math.max(0, a.attackCooldown - 1);
    if (a.attackCooldown <= 0) {
     a.target.hp -= a.damage;
     a.attackCooldown = 18;
    }
   }
  } else {
   a.target = blocks[Math.floor(Math.random() * blocks.length)];
  }
  a.phase += 0.04;
 }
 
 // ========== UPDATE PROJECTILES ==========
 for (const p of projectiles) {
  p.x += p.vx;
  p.y += p.vy;
  p.life--;
  
  for (const a of aliens) {
   const hitDist = 15 * a.size;
   if (Math.hypot(a.x - p.x, a.y - p.y) < hitDist) {
    a.hp -= p.damage;
    p.life = 0;
    const gx = Math.floor(p.x / GRID_SIZE);
    const gy = Math.floor(p.y / GRID_SIZE);
    if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
     atomGrid[gy * GRID_W + gx] = Math.min(1, atomGrid[gy * GRID_W + gx] + 0.2);
    }
    break;
   }
  }
 }
 
 projectiles = projectiles.filter(p => p.life > 0);
 
 // ========== DEAD ALIENS ==========
 for (const a of aliens) {
  if (a.hp <= 0) {
   totalKills++;
   const count = Math.floor(a.size * 10);
   for (let i = 0; i < count; i++) {
    atoms.push({
     x: a.x + (Math.random() - 0.5) * 70,
     y: a.y + (Math.random() - 0.5) * 70,
     type: ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)],
     amount: 3 + Math.floor(Math.random() * 20 * a.size),
     color: ATOM_COLORS[ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)]]
    });
   }
   
   const gx = Math.floor(a.x / GRID_SIZE);
   const gy = Math.floor(a.y / GRID_SIZE);
   for (let dx = -5; dx <= 5; dx++) {
    for (let dy = -5; dy <= 5; dy++) {
     const nx = gx + dx, ny = gy + dy;
     if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
      atomGrid[ny * GRID_W + nx] = Math.min(1, atomGrid[ny * GRID_W + nx] + 0.12);
     }
    }
   }
  }
 }
 
 aliens = aliens.filter(a => a.hp > 0);
 
 // ========== DEAD BLOCKS ==========
 for (const b of blocks) {
  if (b.hp <= 0) {
   for (let i = 0; i < 20; i++) {
    atoms.push({
     x: b.x + (Math.random() - 0.5) * 60,
     y: b.y + (Math.random() - 0.5) * 60,
     type: ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)],
     amount: 5 + Math.floor(Math.random() * 15),
     color: ATOM_COLORS[ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)]]
    });
   }
   
   bridges = bridges.filter(br => br.from !== b && br.to !== b);
   for (const d of drones) { if (d.owner === b) d.dead = true; }
   
   if (b.type === 'core') {
    gameOver = true;
    showGameOver();
   }
  }
 }
 
 blocks = blocks.filter(b => b.hp > 0);
 
 // Clear laser targets for dead aliens
 for (const b of blocks) {
  if (b.laserTarget && !aliens.includes(b.laserTarget)) {
   b.laserTarget = null;
  }
 }
 
 updateUI();
}

// ============================================================================
// GAME OVER / RESTART
// ============================================================================

function showGameOver() {
 document.getElementById('game-over-text').style.display = 'block';
 document.getElementById('final-score').style.display = 'block';
 document.getElementById('final-score').innerHTML = `Modules: ${blocks.length} | Kills: ${totalKills}`;
 document.getElementById('restart-btn').style.display = 'block';
}

function restartGame() {
 // Reset all game state
 blocks = [];
 bridges = [];
 aliens = [];
 projectiles = [];
 atoms = [];
 drones = [];
 gameTime = 0;
 gameOver = false;
 totalKills = 0;
 
 waveTimers = { small: 120, medium: 2000, big: 6000, huge: 15000 };
 waveCount = { small: 0, medium: 0, big: 0, huge: 0 };
 
 resources = { C: 200, H: 200, O: 150, N: 150, Fe: 100, Si: 100, Cu: 80 };
 
 draggingBlock = null;
 hoveredUI = null;
 
 // Hide game over UI
 document.getElementById('game-over-text').style.display = 'none';
 document.getElementById('final-score').style.display = 'none';
 document.getElementById('restart-btn').style.display = 'none';
 
 // Reinitialize
 initAtomGrid();
 initUIBlocks();
 initCore();
 updateUI();
}

document.getElementById('restart-btn').addEventListener('click', restartGame);
document.getElementById('restart-btn').addEventListener('touchend', (e) => {
 e.preventDefault();
 restartGame();
});

// ============================================================================
// VISIBILITY HANDLING
// ============================================================================

document.addEventListener('visibilitychange', () => {
 if (document.hidden) {
  isPaused = true;
 } else {
  isPaused = false;
 }
});

// ============================================================================
// UI UPDATE
// ============================================================================

function updateUI() {
 let total = 0;
 for (const r in resources) total += resources[r];
 
 let html = `<div style="font-size:14px;color:#adf">Resources: <b>${total}</b></div>`;
 html += '<div style="margin-top:8px">';
 for (const r in resources) {
  html += `<div style="display:inline-block;margin-right:8px">${r}: ${resources[r]}</div>`;
 }
 html += '</div>';
 html += `<div style="margin-top:8px;color:#8f8">Modules: ${blocks.length}</div>`;
 html += `<div style="color:#faa">Kills: ${totalKills}</div>`;
 
 document.getElementById('ui-overlay').innerHTML = html;
 
 // Wave info
 let waveHtml = '';
 for (const size in waveCount) {
  if (waveCount[size] > 0) {
   waveHtml += `<div>${size}: ${waveCount[size]}</div>`;
  }
 }
 document.getElementById('wave-info').innerHTML = waveHtml;
}

// ============================================================================
// RENDER FUNCTIONS
// ============================================================================

function render() {
 gl.clearColor(0.008, 0.008, 0.015, 1);
 gl.clear(gl.COLOR_BUFFER_BIT);
 
 renderAtomGrid();
 renderBridges();
 renderBlocks();
 renderLaserBeams();
 renderProjectiles();
 renderDrones();
 renderAtoms();
 renderAliens();
 renderSidebar();
 renderDraggingBlock();
 
 if (gameOver) renderGameOver();
}

function renderAtomGrid() {
 const positions = [];
 const values = [];
 
 for (let y = 0; y < GRID_H; y++) {
  for (let x = 0; x < GRID_W; x++) {
   const idx = y * GRID_W + x;
   const val = atomGrid[idx];
   const x0 = x * GRID_SIZE, y0 = y * GRID_SIZE;
   
   positions.push(x0,y0, x0+GRID_SIZE,y0, x0+GRID_SIZE,y0+GRID_SIZE, x0,y0, x0+GRID_SIZE,y0+GRID_SIZE, x0,y0+GRID_SIZE);
   for (let i = 0; i < 6; i++) values.push(val);
  }
 }
 
 gl.useProgram(progAtom);
 gl.uniform2f(uResAtom, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, atomPosBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, atomValBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(values), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vaoAtom);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderBridges() {
 const positions = [];
 const colors = [];
 
 for (const bridge of bridges) {
  if (!blocks.includes(bridge.from) || !blocks.includes(bridge.to)) continue;
  
  for (const sq of bridge.squares) {
   const pulse = 0.2 + 0.1 * Math.sin(gameTime * 0.04 + sq.phase);
   const bright = (bridge.from.operational || bridge.from.type === 'energy' || bridge.from.type === 'core') ? 0.6 + pulse : 0.2;
   const c = C(sq.c, bright);
   
   positions.push(sq.x-B/2,sq.y-B/2, sq.x+B/2,sq.y-B/2, sq.x+B/2,sq.y+B/2, sq.x-B/2,sq.y-B/2, sq.x+B/2,sq.y+B/2, sq.x-B/2,sq.y+B/2);
   for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
  }
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderBlocks() {
 const positions = [];
 const colors = [];
 
 for (const b of blocks) {
  const def = BLOCK_TYPES[b.type];
  
  let bright = b.operational ? 1.0 : (b.powered ? 0.55 : 0.18);
  const needsEnergy = (def.energyCost > 0) && !b.powered;
  const pulse = b.animPulse || 0;
  
  for (const sq of def.squares) {
   let [rx, ry] = rotateCoord(sq.x, sq.y, b.rotation);
   
   const animPhase = gameTime * 0.03 + b.animOffset + sq.x * 0.15 + sq.y * 0.15;
   const breathe = b.operational ? Math.sin(animPhase) * 0.15 : 0;
   
   const px = b.x + rx * B + breathe;
   const py = b.y + ry * B + breathe;
   
   let c = C(sq.c, bright + pulse * 0.3);
   
   if (needsEnergy) {
    c = [c[0] * 0.5 + 0.35, c[1] * 0.25, c[2] * 0.25];
   }
   
   positions.push(px,py, px+B,py, px+B,py+B, px,py, px+B,py+B, px,py+B);
   for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
  }
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderLaserBeams() {
 const positions = [];
 const colors = [];
 
 for (const b of blocks) {
  if (b.type === 'laser' && b.laserTarget && aliens.includes(b.laserTarget)) {
   const dx = b.laserTarget.x - b.x;
   const dy = b.laserTarget.y - b.y;
   const dist = Math.hypot(dx, dy);
   const steps = Math.floor(dist / B);
   
   for (let i = 0; i < steps; i++) {
    const t = i / steps;
    const px = b.x + dx * t - B/2;
    const py = b.y + dy * t - B/2;
    const alpha = 0.8 - t * 0.4;
    const flicker = Math.sin(gameTime * 0.3 + i * 0.35) * 0.1;
    const c = C(40, alpha + flicker);
    
    positions.push(px,py, px+B,py, px+B,py+B, px,py, px+B,py+B, px,py+B);
    for (let j = 0; j < 6; j++) colors.push(c[0], c[1], c[2]);
   }
  }
 }
 
 // Clear laser targets after rendering
 for (const b of blocks) {
  b.laserTarget = null;
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderProjectiles() {
 const positions = [];
 const colors = [];
 
 for (const p of projectiles) {
  const flicker = Math.sin(gameTime * 0.35 + p.x) * 0.1;
  const c = C(p.color, 1.0 + flicker);
  const bx = p.x - B/2, by = p.y - B/2;
  
  positions.push(bx,by, bx+B,by, bx+B,by+B, bx,by, bx+B,by+B, bx,by+B);
  for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderDrones() {
 const positions = [];
 const colors = [];
 
 for (const d of drones) {
  const flicker = Math.sin(gameTime * 0.15 + d.x + d.y) * 0.1;
  const c = (d.cargo > 0) ? C(35, 0.85 + flicker) : C(34, 0.65 + flicker);
  const bx = d.x - B/2, by = d.y - B/2;
  
  positions.push(bx,by, bx+B,by, bx+B,by+B, bx,by, bx+B,by+B, bx,by+B);
  for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderAtoms() {
 const positions = [];
 const colors = [];
 
 for (const a of atoms) {
  const flicker = 0.5 + 0.5 * Math.sin(gameTime * 0.08 + a.x * 0.06 + a.y * 0.06);
  const c = C(a.color || 57, flicker * 0.6);
  const bx = a.x - B/2, by = a.y - B/2;
  
  positions.push(bx,by, bx+B,by, bx+B,by+B, bx,by, bx+B,by+B, bx,by+B);
  for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderAliens() {
 const positions = [];
 const colors = [];
 
 for (const a of aliens) {
  const size = a.size;
  const count = Math.floor(4 + size * 6);
  const spread = 1.0 + size * 0.7;
  const seed = Math.floor(a.x * 100) ^ Math.floor(a.y * 10);
  
  for (let i = 0; i < count; i++) {
   const angle = (i / count) * Math.PI * 2;
   const wobble = Math.sin(a.phase + i * 0.5) * 2;
   const r = spread * B * (0.4 + 0.6 * Math.sin(seed + i * 2.0));
   
   const px = a.x + Math.cos(angle + Math.sin(gameTime * 0.02 + i) * 0.3) * r + wobble - B/2;
   const py = a.y + Math.sin(angle + Math.sin(gameTime * 0.02 + i) * 0.3) * r + wobble - B/2;
   
   const cIdx = 48 + (i % 8);
   const pulse = 0.7 + 0.3 * Math.sin(a.phase + i * 0.4);
   const c = C(cIdx, pulse);
   
   positions.push(px,py, px+B,py, px+B,py+B, px,py, px+B,py+B, px,py+B);
   for (let j = 0; j < 6; j++) colors.push(c[0], c[1], c[2]);
  }
 }
 
 if (positions.length === 0) return;
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderSidebar() {
 const positions = [];
 const colors = [];
 
 // Sidebar background
 const sbX = W - SIDEBAR_W;
 positions.push(sbX,0, W,0, W,H, sbX,0, W,H, sbX,H);
 for (let i = 0; i < 6; i++) colors.push(0.015, 0.018, 0.025);
 
 // Border
 positions.push(sbX,0, sbX+2,0, sbX+2,H, sbX,0, sbX+2,H, sbX,H);
 for (let i = 0; i < 6; i++) colors.push(0.1, 0.12, 0.15);
 
 // Draw module previews
 const scale = isMobile ? 0.30 : 0.38;
 
 for (const ui of uiBlocks) {
  const def = BLOCK_TYPES[ui.type];
  const bx = ui.x + (ui.w / 2);
  const by = ui.y + (isMobile ? 18 : 25);
  
  // Highlight if hovered or touched
  if (hoveredUI === ui || (draggingBlock && draggingBlock.type === ui.type)) {
   positions.push(ui.x-2,ui.y-2, ui.x+ui.w+2,ui.y-2, ui.x+ui.w+2,ui.y+ui.h+2, ui.x-2,ui.y-2, ui.x+ui.w+2,ui.y+ui.h+2, ui.x-2,ui.y+ui.h+2);
   for (let i = 0; i < 6; i++) colors.push(0.2, 0.25, 0.35);
  }
  
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const sq of def.squares) {
   if (sq.x < minX) minX = sq.x;
   if (sq.x > maxX) maxX = sq.x;
   if (sq.y < minY) minY = sq.y;
   if (sq.y > maxY) maxY = sq.y;
  }
  
  const offsetX = -(minX + maxX) / 2;
  const offsetY = -(minY + maxY) / 2;
  
  for (const sq of def.squares) {
   const px = bx + (sq.x + offsetX) * B * scale;
   const py = by + (sq.y + offsetY) * B * scale;
   const c = C(sq.c, 0.8);
   
   positions.push(px,py, px+B*scale,py, px+B*scale,py+B*scale, px,py, px+B*scale,py+B*scale, px,py+B*scale);
   for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
  }
 }
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderDraggingBlock() {
 if (!draggingBlock) return;
 
 const def = BLOCK_TYPES[draggingBlock.type];
 const positions = [];
 const colors = [];
 
 let baseBright;
 if (!draggingBlock.canPlace) {
  baseBright = 0.15;
 } else if (draggingBlock.needsMoreEnergy) {
  baseBright = 0.35;
 } else {
  baseBright = 0.7;
 }
 
 const needsEnergy = draggingBlock.needsMoreEnergy;
 
 let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
 for (const sq of def.squares) {
  if (sq.x < minX) minX = sq.x;
  if (sq.x > maxX) maxX = sq.x;
  if (sq.y < minY) minY = sq.y;
  if (sq.y > maxY) maxY = sq.y;
 }
 
 const offsetX = -(minX + maxX) / 2;
 const offsetY = -(minY + maxY) / 2;
 const scale = isMobile ? 0.45 : 0.55;
 
 for (const sq of def.squares) {
  const px = draggingBlock.x + (sq.x + offsetX) * B * scale;
  const py = draggingBlock.y + (sq.y + offsetY) * B * scale;
  
  let c = C(sq.c, baseBright);
  if (needsEnergy) {
   c = [c[0] * 0.45 + 0.30, c[1] * 0.20, c[2] * 0.20];
  }
  
  positions.push(px,py, px+B*scale,py, px+B*scale,py+B*scale, px,py, px+B*scale,py+B*scale, px,py+B*scale);
  for (let i = 0; i < 6; i++) colors.push(c[0], c[1], c[2]);
 }
 
 // Preview bridge
 if (draggingBlock.nearestBlock && draggingBlock.canPlace) {
  const nb = draggingBlock.nearestBlock;
  const dx = nb.x - draggingBlock.x;
  const dy = nb.y - draggingBlock.y;
  const dist = Math.hypot(dx, dy);
  const steps = Math.floor(dist / 8);
  
  for (let i = 1; i < steps; i++) {
   const t = i / steps;
   const px = draggingBlock.x + dx * t - B/2;
   const py = draggingBlock.y + dy * t - B/2;
   const alpha = 0.3 + Math.sin(gameTime * 0.08 + i * 0.25) * 0.15;
   const c = C(60, alpha);
   
   positions.push(px,py, px+B,py, px+B,py+B, px,py, px+B,py+B, px,py+B);
   for (let j = 0; j < 6; j++) colors.push(c[0], c[1], c[2]);
  }
 }
 
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
}

function renderGameOver() {
 const positions = [0,0, W,0, W,H, 0,0, W,H, 0,H];
 const colors = [];
 const pulse = 0.2 + 0.12 * Math.sin(gameTime * 0.05);
 for (let i = 0; i < 6; i++) colors.push(0.3 * pulse, 0.04, 0.04);
 
 gl.enable(gl.BLEND);
 gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
 gl.useProgram(prog);
 gl.uniform2f(uRes, W, H);
 gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
 gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
 gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
 gl.bindVertexArray(vao);
 gl.drawArrays(gl.TRIANGLES, 0, 6);
 gl.disable(gl.BLEND);
}

// ============================================================================
// RESIZE HANDLER
// ============================================================================

function handleResize() {
 W = window.innerWidth;
 H = window.innerHeight;
 canvas.width = W;
 canvas.height = H;
 gl.viewport(0, 0, W, H);
 
 SIDEBAR_W = getSidebarWidth();
 
 GRID_W = Math.ceil(W / GRID_SIZE);
 GRID_H = Math.ceil(H / GRID_SIZE);
 atomGrid = new Float32Array(GRID_W * GRID_H);
 initAtomGrid();
 initUIBlocks();
}

window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => {
 setTimeout(handleResize, 100);
});

// ============================================================================
// INIT & GAME LOOP
// ============================================================================

initAtomGrid();
initUIBlocks();
initCore();
updateUI();

function gameLoop() {
 update();
 render();
 requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
