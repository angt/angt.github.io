    <!--
    VOIDCRAFT - GAME MANUAL

    OVERVIEW
    --------
    VoidCraft is an intense space survival tower defense game where you build and
    expand your spaceship while defending against relentless waves of alien invaders.
    Collect atomic resources from destroyed enemies to construct powerful modules.
    Protect your Command Core at all costs. Harness the devastating power of the
    Singularity Pulse - an ultimate weapon that creates a localized black hole,
    obliterating ALL matter in its radius.

    OBJECTIVE
    ---------
    Survive as long as possible by building defensive structures and collecting
    resources. The game ends when your Command Core is destroyed by alien forces.

    RESOURCE SYSTEM
    ---------------
    Seven atomic elements are collected from destroyed aliens:
    - C (Carbon) - Gray - Structural components
    - H (Hydrogen) - Light Gray - Energy systems
    - O (Oxygen) - Cyan - Life support modules
    - N (Nitrogen) - Purple - Specialized tech
    - Fe (Iron) - Red - Armor and weapons
    - Si (Silicon) - Silver - Electronics
    - Cu (Copper) - Orange - Power conduits

    Each module requires specific amounts of different atom types.
    Resources are stored in the Core (infinite capacity) or Cargo Bays (800 each).

    POWER SYSTEM
    ------------
    Most modules require power to operate. Power sources:
    - Command Core: Powers 2 nearby modules (range: 200px)
    - Reactor: Powers 3 nearby modules (range: 220px)
    - Hull Section: Passes power through (no cost)

    Unpowered modules appear dark and cannot function. Build Reactors near
    weapons and collectors to keep them operational.

    MODULE TYPES
    ------------

    COMMAND CORE (Starting Module)
      HP: 2000 | Cost: Free | Power: Produces 3
      - Central hub that must be protected at all costs
      - Auto-defends against small/medium aliens (damage: 15, range: 220)
      - Stores collected resources with infinite capacity
      - Game over if destroyed

    REACTOR
      HP: 150 | See costs below | Power: Produces 3
      - Essential power generator for the ship
      - Powers up to 3 modules within 220px range
      - Build multiple to power larger ships

    CARGO BAY
      HP: 180 | See costs below | Power: Consumes 1
      - Storage facility for collected resources (capacity: 800)
      - Resources flow from storage to Core automatically
      - Build near collectors for efficient gathering

    PLASMA CANNON
      HP: 120 | See costs below | Power: Consumes 1
      - Heavy projectile weapon
      - Damage: 45 per shot | Range: 400px | Cooldown: 45 frames
      - Best against large, slow targets

    LASER ARRAY
      HP: 90 | See costs below | Power: Consumes 1
      - Continuous beam weapon
      - Damage: 6 per frame | Range: 550px | Cooldown: 2 frames
      - Best against fast, small targets

    SENSOR ARRAY
      HP: 100 | See costs below | Power: Consumes 1
      - Extends targeting range for nearby weapons (x1.3 boost)
      - Range: 700px detection radius

    MINING DRONE BAY
      HP: 80 | See costs below | Power: Consumes 1
      - Launches drones to collect atoms from destroyed aliens
      - Max 6 active drones per bay
      - Essential for resource economy

    HULL SECTION
      HP: 200 | See costs below | Power: Pass-through
      - Structural connector module
      - Cheapest way to extend your ship
      - No power required, can bridge power gaps

    SINGULARITY PULSE (Ultimate Weapon)
      HP: 250 | Cost: Very High | Power: Consumes 9
      - DEVASTATING COSMIC WEAPON that creates a localized black hole
      - Features animated swirling energy vortex with orbiting light particles
      - Triggers when 8+ aliens are within 450px range
      - CHARGING PHASE: Energy particles spiral inward, light intensifies
      - FIRING EFFECT: Massive implosion pulls all matter toward center
      - TOTAL ANNIHILATION:
        * ALL aliens in range are erased from existence
        * NO atoms are spawned from singularity-killed aliens (matter is destroyed)
        * ALL existing atoms in range dissolve into the void
        * The atom grid is cleared within the effect radius
      - Creates expanding reality-rupture shockwave
      - Leaves behind a temporary void rift that fades
      - Cooldown: 900 frames (15 seconds) after discharge
      - Requires significant resources to build (designed for late game)
      - Essential for surviving massive alien horde attacks
      - WARNING: You gain no resources from aliens killed by singularity!
        (Their matter is completely destroyed, not converted to atoms)

    BUILDING MECHANICS
    ------------------
    1. Drag modules from the right sidebar onto the play area
    2. Modules must be placed within 350px of an existing module
    3. A bridge is automatically created to connect new modules
    4. Preview shows placement validity (green=ok, orange=needs power)
    5. Unaffordable modules appear faded in the sidebar

    ALIEN THREATS
    -------------
    Four sizes of aliens attack randomly:

    SMALL (Green, size 1x)
      HP: ~20 | Damage: 5 | Appears frequently, easy to kill

    MEDIUM (Green, size 1.5x)
      HP: ~60 | Damage: 12 | Moderate threat

    BIG (Green, size 2.4x)
      HP: ~140 | Damage: 28 | Dangerous, requires firepower

    HUGE (Green, size 4x)
      HP: ~320 | Damage: 60 | Boss-level threat, focus fire

    ALIEN ATTACK PATTERNS
    ---------------------
    Aliens spawn from screen edges and target the nearest module.
    Attack intensity follows a Pareto distribution - frequent small
    attacks with rare massive hordes that can overwhelm defenses.

    HORDE EVENTS
    ------------
    Approximately every 8-12 minutes, massive alien hordes attack.
    These swarms contain 200-400 aliens of mixed sizes and require
    the Singularity Pulse or extensive defensive preparations.
    Warning: Multiple huge aliens may appear during horde events.

    THE SINGULARITY EFFECT - COMPLETE ANNIHILATION
    ----------------------------------------------
    When the Singularity Pulse fires, witness the ultimate weapon:
    1. ENERGY BUILD-UP: Swirling particles accelerate inward
    2. IMPLOSION: All matter within range pulled toward center
    3. TOTAL ERASURE:
       - Aliens are removed from existence (not killed normally)
       - No atoms spawn from their destruction - matter is gone
       - All existing atoms in range are absorbed and destroyed
    4. SHOCKWAVE: Reality-bending wave expands outward
    5. VOID RIFT: Temporary rift marks where matter was erased

    IMPORTANT: The singularity is a double-edged sword. While it
    obliterates all enemies in range, you receive NO resources from
    those kills. Use it strategically when overwhelmed, but rely
    on conventional weapons for resource gathering.

    CONTROLS
    --------
    Desktop: Click and drag modules from sidebar to build
    Mobile: Touch and drag modules from sidebar to build

    TIPS FOR SURVIVAL
    -----------------
    1. Build Reactors early - weapons need power
    2. Position Collectors near combat zones for efficient gathering
    3. Use Hull Sections to bridge power to distant modules
    4. Sensor Arrays extend weapon range - place them centrally
    5. Balance offense (Cannons/Lasers) with economy (Collectors)
    6. Protect your Core at all costs - spread defenses around it
    7. Cargo Bays help store resources before they reach the Core
    8. Save resources for the Singularity Pulse before horde events
    9. The Singularity Pulse needs 8+ nearby aliens to trigger
    10. Build multiple Mining Drone Bays to afford the Singularity Pulse
    11. Watch the beautiful annihilation when Singularity fires!
    12. Don't rely on Singularity for resources - it destroys matter!
    13. Use Singularity as emergency defense, not for farming
    -->

    pos.y = -pos.y;
    gl_Position = vec4(pos, 0.0, 1.0);
    vCol = aCol;
}`;

        const fsSource = `#version 300 es
precision highp float;
in vec3 vCol;
out vec4 FragColor;
void main() { FragColor = vec4(vCol, 1.0); }`;

        const vsAtom = `#version 300 es
in vec2 aPos;
in float aVal;
out float vVal;
uniform vec2 uRes;
void main() {
    vec2 pos = aPos / uRes * 2.0 - 1.0;
    pos.y = -pos.y;
    gl_Position = vec4(pos, 0.0, 1.0);
    vVal = aVal;
}`;

        const fsAtom = `#version 300 es
precision highp float;
in float vVal;
out vec4 FragColor;
void main() { FragColor = vec4(vec3(vVal * 0.18), 1.0); }`;

        function createShader(type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source);
            gl.compileShader(s);
            return s;
        }

        function createProgram(vs, fs) {
            const p = gl.createProgram();
            gl.attachShader(p, createShader(gl.VERTEX_SHADER, vs));
            gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(p);
            return p;
        }

        const prog = createProgram(vsSource, fsSource);
        const progAtom = createProgram(vsAtom, fsAtom);

        const uRes = gl.getUniformLocation(prog, 'uRes');
        const uResAtom = gl.getUniformLocation(progAtom, 'uRes');
        const aPos = gl.getAttribLocation(prog, 'aPos');
        const aCol = gl.getAttribLocation(prog, 'aCol');
        const aPosAtom = gl.getAttribLocation(progAtom, 'aPos');
        const aValAtom = gl.getAttribLocation(progAtom, 'aVal');

        const posBuf = gl.createBuffer();
        const colBuf = gl.createBuffer();
        const atomPosBuf = gl.createBuffer();
        const atomValBuf = gl.createBuffer();

        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);
        gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
        gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
        gl.enableVertexAttribArray(aCol);
        gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);

                const color = affordable ? '#5f8' : '#f55';

                if (hoveredUI.type === 'singularity') {

                    extraInfo += '<br><span style="color:#f88">WARNING: No resources from killed aliens!</span>';

                tooltip.innerHTML = `<b>${def.name}</b><br>${def.desc}<br><span style="color:${color}">${costStr}</span>${extraInfo}`;

                let msg = `<b>${def.name}</b><br>`;

        function formatCost(cost) {
            const parts = [];
            for (const r in cost) {
                if (cost[r] > 0) parts.push(`${r}:${cost[r]}`);

            return 'Cost: ' + parts.join(' ');
        }

            for (const r in cost) {
                const needed = cost[r];
                if (needed <= 0) continue;
                const have = resources[r] || 0;
                if (have < needed) {
                    let fromStorage = 0;
                    for (const b of blocks) {
                        if (b.type === 'storage' && b.stored) {
                            fromStorage += b.stored;
                        }
                    }
                    if (have + fromStorage < needed) return false;
                }
            }
            return true;
        }

        function updateDragPreview() {
            if (!draggingBlock) return;

            const def = BLOCK_TYPES[draggingBlock.type];
            const affordable = canAfford(def.cost);

            let nearestBlock = null;
            let nearestDist = Infinity;
            for (const b of blocks) {
                const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearestBlock = b;
                }
            }

            const placementRange = 350;
            const inRange = nearestBlock && nearestDist <= placementRange;
            draggingBlock.canPlace = affordable && inRange;
            draggingBlock.nearestBlock = nearestBlock;

            if (nearestBlock && draggingBlock.canPlace) {
                if (def.energyCost === 0) {
                    draggingBlock.willHavePower = true;
                    draggingBlock.needsMoreEnergy = false;
                } else {
                    let availablePower = 0;
                    for (const b of blocks) {
                        if (b.type === 'energy' || b.type === 'core') {
                            const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
                            const powerRange = BLOCK_TYPES[b.type].powerRange || 200;
                            if (d < powerRange) {
                                availablePower += BLOCK_TYPES[b.type].energyProduce;
                            }
                        }
                    }

                    let currentNeeds = 0;
                    for (const b of blocks) {
                        const need = BLOCK_TYPES[b.type].energyCost;
                        if (need > 0) {
                            const d = Math.hypot(b.x - draggingBlock.x, b.y - draggingBlock.y);
                            if (d < 250) {
                                currentNeeds += need;
                            }
                        }
                    }

                    const totalNeeds = currentNeeds + def.energyCost;
                    draggingBlock.willHavePower = availablePower >= totalNeeds;
                    draggingBlock.needsMoreEnergy = !draggingBlock.willHavePower;
                }
            }
        }

        // ============================================================
        // RESOURCE DEDUCTION
        // ============================================================

        function deductResources(cost) {
            for (const r in cost) {
                let needed = cost[r];

                if (resources[r] >= needed) {
                    resources[r] -= needed;
                    needed = 0;
                } else {
                    needed -= resources[r];
                    resources[r] = 0;
                }

                if (needed > 0) {
                    for (const b of blocks) {
                        if (b.type === 'storage' && b.stored && needed > 0) {
                            const take = Math.min(b.stored, needed);
                            b.stored -= take;
                            needed -= take;
                        }
                    }
                }
            }
        }

        function placeBlock(type, x, y) {
            const def = BLOCK_TYPES[type];

            if (!canAfford(def.cost)) return;

            let nearestBlock = null;
            let nearestDist = Infinity;
            for (const b of blocks) {
                const d = Math.hypot(b.x - x, b.y - y);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearestBlock = b;
                }
            }

            if (!nearestBlock || nearestDist > 350) return;

            deductResources(def.cost);

            const rotation = Math.floor(Math.random() * 4);

            blocks.push({
                type, x, y,
                hp: def.hp,
                maxHp: def.hp,
                operational: false,
                powered: false,
                poweredBy: null,
                cooldown: 0,
                defenseCooldown: 0,
                rotation,
                animOffset: Math.random() * 100,
                drones: [],
                droneCount: 0,
                stored: 0,
                animPulse: 0,
                // Singularity-specific
                triggerCooldown: 0,
                isCharging: false,
                chargeLevel: 0,
                chargeStartTime: 0,
                particles: []
            });

            createBridge(blocks[blocks.length - 1], nearestBlock);
        }

        function createBridge(b1, b2) {
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.hypot(dx, dy);
            const steps = Math.floor(dist / (B * 2.5));

            const bridgeSquares = [];
            for (let i = 1; i < steps; i++) {
                const t = i / steps;
                bridgeSquares.push({
                    x: b1.x + dx * t,
                    y: b1.y + dy * t,
                    c: i % 2 === 0 ? 60 : 62,
                    phase: Math.random() * Math.PI * 2
                });
            }

            bridges.push({ from: b1, to: b2, squares: bridgeSquares });
        }

        function rotateCoord(x, y, rotation) {
            for (let i = 0; i < rotation; i++) [x, y] = [y, -x];
            return [x, y];
        }

        // ============================================================
        // PROBABILISTIC ALIEN SPAWNING WITH HORDE EVENTS
        // ============================================================

        function checkAlienSpawn() {
            nextSpawnCheck--;

            // Check for horde event
            if (gameTime >= nextHordeTime && !hordeActive) {
                if (!hordeWarningShown) {
                    hordeWarningShown = true;
                    hordeWarningStart = gameTime;
                    document.getElementById('horde-warning').style.display = 'block';
                }

                if (gameTime - hordeWarningStart > 180) {
                    hordeActive = true;
                    document.getElementById('horde-warning').style.display = 'none';
                    spawnHorde();
                }
            }

            if (nextSpawnCheck <= 0 && !hordeActive) {
                nextSpawnCheck = 180 + Math.floor(Math.random() * 240);

                const u = Math.random();
                const alpha = 1.5;
                const x_min = 1;

                const attackSize = x_min / Math.pow(u, 1/alpha);

                if (attackSize > 0.5) {
                    spawnAttackWave(attackSize, false);
                }
            }
        }

        function spawnHorde() {
            const hordeSize = 50 + Math.floor(Math.random() * 100);

            for (let wave = 0; wave < 3; wave++) {
                const waveSize = Math.floor(hordeSize / 3);
                for (let i = 0; i < waveSize; i++) {
                    setTimeout(() => {
                        const roll = Math.random();
                        let strength;
                        if (roll < 0.25) strength = 1;
                        else if (roll < 0.50) strength = 2;
                        else if (roll < 0.80) strength = 3;
                        else strength = 4;

                        spawnAlien(strength);
                    }, wave * 2000 + i * (80 + Math.random() * 60));
                }
            }

            setTimeout(() => {
                hordeActive = false;
                hordeWarningShown = false;
                nextHordeTime = gameTime + 4800 + Math.floor(Math.random() * 2400);
            }, 7000);
        }

        function spawnAttackWave(size, isHorde) {
            let aliensToSpawn = Math.floor(size);
            aliensToSpawn = Math.max(1, aliensToSpawn + Math.floor(Math.random() * 3) - 1);

            for (let i = 0; i < aliensToSpawn; i++) {
                const roll = Math.random();
                let strength;

                if (isHorde) {
                    if (roll < 0.2) strength = 1;
                    else if (roll < 0.45) strength = 2;
                    else if (roll < 0.75) strength = 3;
                    else strength = 4;
                } else if (size < 3) {
                    strength = roll < 0.9 ? 1 : 2;
                } else if (size < 10) {
                    if (roll < 0.6) strength = 1;
                    else if (roll < 0.9) strength = 2;
                    else strength = 3;
                } else {
                    if (roll < 0.4) strength = 1;
                    else if (roll < 0.7) strength = 2;
                    else if (roll < 0.9) strength = 3;
                    else strength = 4;
                }

                setTimeout(() => spawnAlien(strength), i * (50 + Math.random() * 100));
            }
        }

        function spawnAlien(strength) {
            const edge = Math.floor(Math.random() * 4);
            let x, y;
            const playW = W - SIDEBAR_W;
            const margin = 80;

            switch(edge) {
                case 0: x = margin; y = Math.random() * H; break;
                case 1: x = playW - margin; y = Math.random() * H; break;
                case 2: x = Math.random() * playW; y = margin; break;
                default: x = Math.random() * playW; y = H - margin; break;
            }

            const hpMult = [20, 60, 140, 320][strength - 1];
            const dmgMult = [5, 12, 28, 60][strength - 1];
            const sizeMult = [1, 1.5, 2.4, 4][strength - 1];

            let target = null;
            let minDist = Infinity;
            for (const b of blocks) {
                const d = Math.hypot(b.x - x, b.y - y);
                if (b.type === 'core' && d < 800) { target = b; break; }
                if (d < minDist) { minDist = d; target = b; }
            }

            if (!target && blocks.length > 0) {
                target = blocks[Math.floor(Math.random() * blocks.length)];
            }

            aliens.push({
                x, y, strength,
                size: sizeMult,
                hp: hpMult * (0.8 + Math.random() * 0.4),
                maxHp: hpMult,
                damage: dmgMult,
                speed: 0.35 + Math.random() * 0.25,
                target,
                attackCooldown: 0,
                phase: Math.random() * Math.PI * 2,
                seed: Math.random() * 1000
            });
        }

        // ============================================================
        // SINGULARITY PULSE - THE ULTIMATE WEAPON
        // Creates a devastating black hole effect
        // COMPLETE ANNIHILATION: No atoms spawn from killed aliens
        // ============================================================

        function triggerSingularityPulse(block) {
            const def = BLOCK_TYPES.singularity;
            const range = def.range;
            const threshold = def.triggerThreshold;

            // Count nearby aliens at trigger time
            let nearbyCount = 0;
            for (const a of aliens) {
                const d = Math.hypot(a.x - block.x, a.y - block.y);
                if (d < range) nearbyCount++;
            }

            if (nearbyCount >= threshold) {
                // Start charging sequence
                block.isCharging = true;
                block.chargeLevel = 0;
                block.chargeStartTime = gameTime;
                block.animPulse = 2;

                // Show warning
                document.getElementById('singularity-warning').style.display = 'block';

                // Charging phase - spawn energy particles
                const chargeDuration = 90; // 1.5 seconds at 60fps
                const particleSpawnInterval = setInterval(() => {
                    if (!block.isCharging || !blocks.includes(block)) {
                        clearInterval(particleSpawnInterval);
                        return;
                    }

                    // Spawn swirling particles
                    for (let i = 0; i < 3; i++) {
                        const p = getSingularityParticle();
                        const angle = Math.random() * Math.PI * 2;
                        const startRadius = 80 + Math.random() * 120;
                        p.x = block.x + Math.cos(angle) * startRadius;
                        p.y = block.y + Math.sin(angle) * startRadius;
                        p.angle = angle;
                        p.radius = startRadius;
                        p.speed = 0.03 + Math.random() * 0.04;
                        p.brightness = 0.5 + Math.random() * 0.5;
                        p.size = 1 + Math.random() * 2;
                        p.life = 60 + Math.random() * 60;
                        p.maxLife = p.life;
                        p.ownerX = block.x;
                        p.ownerY = block.y;
                        singularityParticles.push(p);
                    }
                }, 16);

                // After charging, fire the weapon
                setTimeout(() => {
                    if (!blocks.includes(block)) {
                        document.getElementById('singularity-warning').style.display = 'none';
                        return;
                    }

                    document.getElementById('singularity-warning').style.display = 'none';
                    block.isCharging = false;

                    // IMPLOSION EFFECT - Pull everything toward center
                    // Create massive shockwave
                    const sw = getShockwave();
                    sw.x = block.x;
                    sw.y = block.y;
                    sw.radius = 0;
                    sw.maxRadius = range;
                    sw.life = 90;
                    sw.alpha = 1;
                    sw.type = 'singularity';
                    shockwaves.push(sw);

                    // Create void rift - lingering effect
                    const rift = getVoidRift();
                    rift.x = block.x;
                    rift.y = block.y;
                    rift.radius = range * 0.8;
                    rift.maxRadius = range;
                    rift.life = 180;
                    rift.maxLife = 180;
                    rift.phase = 0;
                    voidRifts.push(rift);

                    // ====================================================
                    // COMPLETE ANNIHILATION - ALL MATTER ERASED
                    // Aliens are removed directly - NO atoms spawn!
                    // ====================================================

                    let killCount = 0;

                    // Collect all aliens in range AT THE MOMENT OF FIRING
                    // We calculate position at firing time, not trigger time
                    const aliensToRemove = [];
                    for (let i = aliens.length - 1; i >= 0; i--) {
                        const a = aliens[i];
                        const d = Math.hypot(a.x - block.x, a.y - block.y);
                        if (d < range) {
                            aliensToRemove.push({ alien: a, dist: d, index: i });
                        }
                    }

                    // Sort by index descending to splice correctly without index issues
                    aliensToRemove.sort((a, b) => b.index - a.index);

                    // Process each alien: create visual effect, remove from array
                    // CRITICAL: We do NOT spawn atoms - matter is destroyed!
                    for (const { alien: a, dist: d, index } of aliensToRemove) {
                        killCount++;

                        // Create dissolution particles for visual effect
                        // These spiral into the void but produce no resources
                        const particleCount = Math.floor(a.size * 12);
                        for (let i = 0; i < particleCount; i++) {
                            const p = getSingularityParticle();
                            const angle = Math.random() * Math.PI * 2;
                            p.x = a.x;
                            p.y = a.y;
                            p.angle = angle;
                            p.radius = d;
                            p.speed = 0.08 + Math.random() * 0.06;
                            p.brightness = 0.8 + Math.random() * 0.2;
                            p.size = 1.5 + Math.random() * 2;
                            p.life = 30 + Math.random() * 30;
                            p.maxLife = p.life;
                            p.ownerX = block.x;
                            p.ownerY = block.y;
                            singularityParticles.push(p);
                        }

                        // DIRECT REMOVAL - alien is erased from existence
                        // No atoms will spawn because we bypass the normal death code
                        aliens.splice(index, 1);
                    }

                    // Update global kill counter
                    totalKills += killCount;

                    // ====================================================
                    // ANNIHILATE ALL EXISTING ATOMS IN RANGE
                    // They dissolve into the void - no resources recovered
                    // ====================================================

                    for (let i = atoms.length - 1; i >= 0; i--) {
                        const a = atoms[i];
                        const d = Math.hypot(a.x - block.x, a.y - block.y);
                        if (d < range) {
                            // Create dissolution effect
                            const p = getSingularityParticle();
                            p.x = a.x;
                            p.y = a.y;
                            p.angle = Math.atan2(a.y - block.y, a.x - block.x);
                            p.radius = d;
                            p.speed = 0.1;
                            p.brightness = 0.6;
                            p.size = 1;
                            p.life = 20;
                            p.maxLife = 20;
                            p.ownerX = block.x;
                            p.ownerY = block.y;
                            singularityParticles.push(p);

                            // Remove the atom completely
                            returnAtom(a);
                            atoms.splice(i, 1);
                        }
                    }

                    // Clear the atom grid in range - no residue left
                    const gx = Math.floor(block.x / GRID_SIZE);
                    const gy = Math.floor(block.y / GRID_SIZE);
                    const gridRange = Math.ceil(range / GRID_SIZE);
                    for (let dx = -gridRange; dx <= gridRange; dx++) {
                        for (let dy = -gridRange; dy <= gridRange; dy++) {
                            const nx = gx + dx;
                            const ny = gy + dy;
                            if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                                const cellDist = Math.hypot(dx, dy) * GRID_SIZE;
                                if (cellDist < range) {
                                    atomGrid[ny * GRID_W + nx] = 0;
                                }
                            }
                        }
                    }

                    // Set cooldown
                    block.triggerCooldown = def.cooldown;
                    block.chargeLevel = 0;

                }, chargeDuration * 16.67);

                return 0;
            }

            return 0;
        }

        // ============================================================
        // GAME UPDATE
        // ============================================================

        function update() {
            if (gameOver || isPaused) return;

            gameTime++;
            survivalTime = Math.floor(gameTime / 60);

            // Probabilistic alien spawning with horde events
            checkAlienSpawn();

            // Atom grid decay
            for (let i = 0; i < atomGrid.length; i++) {
                atomGrid[i] *= 0.992;
                if (Math.random() < 0.0003) atomGrid[i] = Math.min(1, atomGrid[i] + 0.12);
            }

            // Update singularity particles (swirling lights)
            for (let i = singularityParticles.length - 1; i >= 0; i--) {
                const p = singularityParticles[i];

                // Spiral inward toward owner
                p.angle += p.speed;
                p.radius -= 1.5;
                p.x = p.ownerX + Math.cos(p.angle) * Math.max(0, p.radius);
                p.y = p.ownerY + Math.sin(p.angle) * Math.max(0, p.radius);

                p.life--;
                p.brightness *= 0.98;

                if (p.life <= 0 || p.radius <= 0) {
                    returnSingularityParticle(p);
                    singularityParticles.splice(i, 1);
                }
            }

            // Update void rifts
            for (let i = voidRifts.length - 1; i >= 0; i--) {
                const rift = voidRifts[i];
                rift.life--;
                rift.phase += 0.05;

                if (rift.life <= 0) {
                    returnVoidRift(rift);
                    voidRifts.splice(i, 1);
                }
            }

            // Power distribution
            for (const b of blocks) {
                b.powered = (b.type === 'core') || (b.type === 'energy') || (b.type === 'hull');
                b.poweredBy = null;
            }

            const powerSources = blocks.filter(b => b.type === 'energy' || b.type === 'core');

            for (const source of powerSources) {
                const sourceDef = BLOCK_TYPES[source.type];
                const powerRange = sourceDef.powerRange || 200;
                const maxPowered = sourceDef.maxPowered || 3;

                const nearby = [];
                for (const b of blocks) {
                    if (b === source) continue;
                    if (b.powered) continue;
                    if (BLOCK_TYPES[b.type].energyCost === 0) continue;

                    const d = Math.hypot(b.x - source.x, b.y - source.y);
                    if (d < powerRange) {
                        nearby.push({ block: b, dist: d });
                    }
                }

                nearby.sort((a, b) => a.dist - b.dist);

                let powered = 0;
                for (const { block: b } of nearby) {
                    if (powered >= maxPowered) break;
                    b.powered = true;
                    b.poweredBy = source;
                    powered++;
                }
            }

            for (const b of blocks) {
                const def = BLOCK_TYPES[b.type];
                if (def.energyCost === 0) {
                    b.operational = true;
                } else {
                    b.operational = b.powered;
                }

                if (b.animPulse === undefined) b.animPulse = 0;
            }

            for (const b of blocks) {
                const def = BLOCK_TYPES[b.type];

                // Core defense
                if (b.type === 'core') {
                    b.defenseCooldown = Math.max(0, b.defenseCooldown - 1);

                    if (b.defenseCooldown <= 0) {
                        let closest = null;
                        let minD = def.defenseRange;

                        for (const a of aliens) {
                            const d = Math.hypot(a.x - b.x, a.y - b.y);
                            if (d < minD && a.strength <= 2) {
                                minD = d;
                                closest = a;
                            }
                        }

                        if (closest) {
                            const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
                            const p = getProjectile();
                            p.x = b.x;
                            p.y = b.y;
                            p.vx = Math.cos(angle) * 8;
                            p.vy = Math.sin(angle) * 8;
                            p.damage = def.defenseDamage;
                            p.color = 12;
                            p.life = 120;
                            projectiles.push(p);
                            b.defenseCooldown = def.defenseCooldown;
                            b.animPulse = 1;
                        }
                    }
                }

                // Canon firing
                if (b.type === 'canon' && b.operational) {
                    b.cooldown = Math.max(0, b.cooldown - 1);

                    if (b.cooldown <= 0) {
                        let closest = null;
                        let minD = def.range;

                        for (const a of aliens) {
                            const d = Math.hypot(a.x - b.x, a.y - b.y);
                            if (d < minD) {
                                minD = d;
                                closest = a;
                            }
                        }

                        if (closest) {
                            const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
                            const p = getProjectile();
                            p.x = b.x;
                            p.y = b.y;
                            p.vx = Math.cos(angle) * 12;
                            p.vy = Math.sin(angle) * 12;
                            p.damage = def.damage;
                            p.color = 28;
                            p.life = 150;
                            projectiles.push(p);
                            b.cooldown = def.cooldown;
                            b.animPulse = 1;
                        }
                    }
                }

                // Laser firing
                if (b.type === 'laser' && b.operational) {
                    b.cooldown = Math.max(0, b.cooldown - 1);

                    if (b.cooldown <= 0) {
                        let closest = null;
                        let minD = def.range;

                        for (const a of aliens) {
                            const d = Math.hypot(a.x - b.x, a.y - b.y);
                            if (d < minD) {
                                minD = d;
                                closest = a;
                            }
                        }

                        if (closest) {
                            closest.hp -= def.damage;
                            b.laserTarget = closest;
                            b.animPulse = 1;
                        }

                        b.cooldown = def.cooldown;
                    }
                }

                // Singularity Pulse - Ultimate weapon with animated effects
                if (b.type === 'singularity' && b.operational) {
                    b.triggerCooldown = Math.max(0, b.triggerCooldown - 1);

                    // Spawn ambient swirling particles when operational
                    if (Math.random() < 0.3 && !b.isCharging) {
                        const p = getSingularityParticle();
                        const angle = Math.random() * Math.PI * 2;
                        const startRadius = 25 + Math.random() * 15;
                        p.x = b.x + Math.cos(angle) * startRadius;
                        p.y = b.y + Math.sin(angle) * startRadius;
                        p.angle = angle;
                        p.radius = startRadius;
                        p.speed = 0.02 + Math.random() * 0.03;
                        p.brightness = 0.4 + Math.random() * 0.3;
                        p.size = 0.8 + Math.random() * 1.2;
                        p.life = 40 + Math.random() * 40;
                        p.maxLife = p.life;
                        p.ownerX = b.x;
                        p.ownerY = b.y;
                        singularityParticles.push(p);
                    }

                    // Check for trigger when cooldown is ready
                    if (b.triggerCooldown <= 0 && !b.isCharging) {
                        const range = def.range;
                        const threshold = def.triggerThreshold;

                        let nearbyCount = 0;
                        for (const a of aliens) {
                            const d = Math.hypot(a.x - b.x, a.y - b.y);
                            if (d < range) nearbyCount++;
                        }

                        if (nearbyCount >= threshold) {
                            triggerSingularityPulse(b);
                        }
                    }

                    // Charging animation
                    if (b.isCharging) {
                        b.chargeLevel = Math.min(1, b.chargeLevel + 0.012);
                        b.animPulse = 1 + b.chargeLevel;
                    } else {
                        b.chargeLevel = Math.max(0, b.chargeLevel - 0.02);
                    }

                    // Continuous pulse glow when operational
                    if (!b.isCharging) {
                        b.animPulse = 0.3 + 0.2 * Math.sin(gameTime * 0.08 + b.animOffset);
                    }
                }

                // Radar animation
                if (b.type === 'radar' && b.operational) {
                    b.animPulse = 0.5 + 0.5 * Math.sin(gameTime * 0.05 + b.animOffset);
                }

                // Collector drone spawning
                if (b.type === 'collector' && b.operational) {
                    if (b.droneCount < (def.droneMax || 6) && Math.random() < 0.025) {
                        const d = getDrone();
                        d.owner = b;
                        d.x = b.x;
                        d.y = b.y;
                        d.state = 'seeking';
                        d.target = null;
                        d.cargo = 0;
                        d.cargoType = null;
                        d.homeX = b.x;
                        d.homeY = b.y;
                        drones.push(d);
                        b.droneCount++;
                    }
                    b.animPulse = 0.2;
                }

                // Energy glow
                if (b.type === 'energy') {
                    b.animPulse = 0.6 + 0.4 * Math.sin(gameTime * 0.06 + b.animOffset);
                }

                // Core glow
                if (b.type === 'core') {
                    b.animPulse = 0.4 + 0.3 * Math.sin(gameTime * 0.04);
                }

                b.animPulse = Math.max(0, (b.animPulse || 0) - 0.02);
            }

            // Update shockwaves
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                sw.radius += (sw.maxRadius - sw.radius) * 0.12;
                sw.life--;
                sw.alpha = sw.life / (sw.type === 'singularity' ? 90 : 60);

                if (sw.life <= 0) {
                    returnShockwave(sw);
                    shockwaves.splice(i, 1);
                }
            }

            for (const d of drones) {
                if (!blocks.includes(d.owner)) {
                    d.dead = true;
                    continue;
                }

                d.homeX = d.owner.x;
                d.homeY = d.owner.y;

                if (d.state === 'seeking') {
                    if (!d.target || d.target.collected) {
                        let nearest = null;
                        let minD = 500;
                        for (const a of atoms) {
                            if (a.collected) continue;
                            const dist = Math.hypot(a.x - d.x, a.y - d.y);
                            if (dist < minD) { minD = dist; nearest = a; }
                        }
                        d.target = nearest;
                    }

                    if (d.target && !d.target.collected) {
                        const angle = Math.atan2(d.target.y - d.y, d.target.x - d.x);
                        d.x += Math.cos(angle) * 3;
                        d.y += Math.sin(angle) * 3;

                        if (Math.hypot(d.target.x - d.x, d.target.y - d.y) < 15) {
                            d.cargo = d.target.amount;
                            d.cargoType = d.target.type;
                            d.target.collected = true;
                            d.target = null;
                            d.state = 'returning';
                        }
                    } else {
                        const angle = Math.atan2(d.homeY - d.y, d.homeX - d.x);
                        d.x += Math.cos(angle) * 0.8;
                        d.y += Math.sin(angle) * 0.8;
                    }
                }

                if (d.state === 'returning') {
                    const angle = Math.atan2(d.homeY - d.y, d.homeX - d.x);
                    d.x += Math.cos(angle) * 3.5;
                    d.y += Math.sin(angle) * 3.5;

                    if (Math.hypot(d.homeX - d.x, d.homeY - d.y) < 25) {
                        let storage = null;
                        for (const b of blocks) {
                            if (b.type === 'storage' && b.operational) {
                                const storageDist = Math.hypot(b.x - d.homeX, b.y - d.homeY);
                                if (!storage || storageDist < Math.hypot(storage.x - d.homeX, storage.y - d.homeY)) {
                                    storage = b;
                                }
                            }
                        }

                        if (storage && storage.stored < BLOCK_TYPES.storage.capacity) {
                            const space = BLOCK_TYPES.storage.capacity - (storage.stored || 0);
                            storage.stored = (storage.stored || 0) + Math.min(d.cargo, space);

                            if (d.cargo > space) {
                                resources[d.cargoType] = (resources[d.cargoType] || 0) + (d.cargo - space);
                            }
                        } else {
                            resources[d.cargoType] = (resources[d.cargoType] || 0) + d.cargo;
                        }

                        d.cargo = 0;
                        d.cargoType = null;
                        d.state = 'seeking';
                        if (d.owner) d.owner.animPulse = 1;
                    }
                }
            }

            // Return dead drones to pool
            for (let i = drones.length - 1; i >= 0; i--) {
                if (drones[i].dead) {
                    if (drones[i].owner) {
                        drones[i].owner.droneCount = Math.max(0, (drones[i].owner.droneCount || 0) - 1);
                    }
                    returnDrone(drones[i]);
                    drones.splice(i, 1);
                }
            }

            // Return collected atoms to pool
            for (let i = atoms.length - 1; i >= 0; i--) {
                if (atoms[i].collected) {
                    returnAtom(atoms[i]);
                    atoms.splice(i, 1);
                }
            }

            for (const a of aliens) {
                if (a.target && blocks.includes(a.target)) {
                    const angle = Math.atan2(a.target.y - a.y, a.target.x - a.x);
                    a.x += Math.cos(angle) * a.speed;
                    a.y += Math.sin(angle) * a.speed;

                    if (Math.hypot(a.target.x - a.x, a.target.y - a.y) < 25) {
                        a.attackCooldown = Math.max(0, a.attackCooldown - 1);
                        if (a.attackCooldown <= 0) {
                            a.target.hp -= a.damage;
                            a.attackCooldown = 18;
                        }
                    }
                } else {
                    let newTarget = null;
                    let minDist = Infinity;
                    for (const b of blocks) {
                        const d = Math.hypot(b.x - a.x, b.y - a.y);
                        if (d < minDist) {
                            minDist = d;
                            newTarget = b;
                        }
                    }
                    a.target = newTarget;
                }
                a.phase += 0.04;
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                for (const a of aliens) {
                    const hitDist = 15 * a.size;
                    if (Math.hypot(a.x - p.x, a.y - p.y) < hitDist) {
                        a.hp -= p.damage;
                        p.life = 0;
                        const gx = Math.floor(p.x / GRID_SIZE);
                        const gy = Math.floor(p.y / GRID_SIZE);
                        if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
                            atomGrid[gy * GRID_W + gx] = Math.min(1, atomGrid[gy * GRID_W + gx] + 0.2);
                        }
                        break;
                    }
                }

                if (p.life <= 0) {
                    returnProjectile(p);
                    projectiles.splice(i, 1);
                }
            }

            for (let i = aliens.length - 1; i >= 0; i--) {
                const a = aliens[i];
                if (a.hp <= 0) {
                    totalKills++;
                    const count = Math.floor(a.size * 8);
                    for (let j = 0; j < count; j++) {
                        const atom = getAtom();
                        atom.x = a.x + (Math.random() - 0.5) * 70;
                        atom.y = a.y + (Math.random() - 0.5) * 70;
                        atom.type = ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)];
                        atom.amount = 2 + Math.floor(Math.random() * 8 * a.size);
                        atom.color = ATOM_COLORS[atom.type];
                        atom.phase = Math.random() * Math.PI * 2;
                        atoms.push(atom);
                    }

                    const gx = Math.floor(a.x / GRID_SIZE);
                    const gy = Math.floor(a.y / GRID_SIZE);
                    for (let dx = -5; dx <= 5; dx++) {
                        for (let dy = -5; dy <= 5; dy++) {
                            const nx = gx + dx, ny = gy + dy;
                            if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                                atomGrid[ny * GRID_W + nx] = Math.min(1, atomGrid[ny * GRID_W + nx] + 0.12);
                            }
                        }
                    }

                    aliens.splice(i, 1);
                }
            }

            for (let i = blocks.length - 1; i >= 0; i--) {
                const b = blocks[i];
                if (b.hp <= 0) {
                    for (let j = 0; j < 20; j++) {
                        const atom = getAtom();
                        atom.x = b.x + (Math.random() - 0.5) * 60;
                        atom.y = b.y + (Math.random() - 0.5) * 60;
                        atom.type = ATOM_TYPES[Math.floor(Math.random() * ATOM_TYPES.length)];
                        atom.amount = 3 + Math.floor(Math.random() * 10);
                        atom.color = ATOM_COLORS[atom.type];
                        atom.phase = Math.random() * Math.PI * 2;
                        atoms.push(atom);
                    }

                    bridges = bridges.filter(br => br.from !== b && br.to !== b);
                    for (const d of drones) { if (d.owner === b) d.dead = true; }

                    if (b.type === 'core') {
                        gameOver = true;
                        showGameOver();
                    }

                    blocks.splice(i, 1);
                }
            }

            // Clear laser targets for dead aliens
            for (const b of blocks) {
                if (b.laserTarget && !aliens.includes(b.laserTarget)) {
                    b.laserTarget = null;
                }
            }

            updateUI();
        }

        // ============================================================
        // GAME OVER
        // ============================================================

        function showGameOver() {
            document.getElementById('game-over-text').style.display = 'block';
            document.getElementById('final-score').style.display = 'block';
            document.getElementById('restart-btn').style.display = 'block';
            document.getElementById('final-score').innerHTML = `
                <div style="margin-bottom:10px">⏱ Survival Time: ${Math.floor(gameTime/60)}s</div>
                <div style="margin-bottom:10px">🏗 Modules Built: ${blocks.length}</div>
                <div>💀 Total Kills: ${totalKills}</div>
            `;
        }

        // ============================================================
        // RESTART GAME
        // ============================================================

        function restartGame() {
            // Reset game state
            blocks = [];
            bridges = [];
            aliens = [];
            projectiles = [];
            atoms = [];
            drones = [];
            shockwaves = [];
            singularityParticles = [];
            voidRifts = [];
            gameTime = 0;
            gameOver = false;
            totalKills = 0;
            survivalTime = 0;
            nextHordeTime = 4800 + Math.floor(Math.random() * 2400);
            hordeActive = false;
            hordeWarningShown = false;
            nextSpawnCheck = 60;

            // Reset resources
            resources = calculateStarterResources();

            // Reset atom grid
            initAtomGrid();

            // Hide game over UI
            document.getElementById('game-over-text').style.display = 'none';
            document.getElementById('final-score').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none';
            document.getElementById('horde-warning').style.display = 'none';
            document.getElementById('singularity-warning').style.display = 'none';

            // Reinitialize core and UI
            initCore();
            initUIBlocks();
            updateUI();
        }

        // ============================================================
        // VISIBILITY HANDLING
        // ============================================================

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isPaused = true;
            } else {
                isPaused = false;
            }
        });

        // ============================================================
        // UI UPDATE
        // ============================================================

        function updateUI() {
            let html = '<div style="font-size:14px;color:#adf">Resources:</div>';
            html += '<div style="font-size:11px">';
            for (const r in resources) {
                html += `<span style="margin-right:6px">${r}:${resources[r]}</span>`;
            }
            html += '</div>';

            let storedTotal = 0;
            for (const b of blocks) {
                if (b.type === 'storage' && b.stored) {
                    storedTotal += b.stored;
                }
            }
            if (storedTotal > 0) {
                html += `<div style="font-size:11px;color:#8f8">Storage: ${storedTotal}</div>`;
            }

            html += `<div style="margin-top:8px;color:#8f8">Modules: ${blocks.length}</div>`;
            html += `<div style="color:#faa">Kills: ${totalKills}</div>`;
            html += `<div style="color:#ff8">Time: ${Math.floor(gameTime/60)}s</div>`;

            if (hordeWarningShown) {
                html += `<div style="color:#f5f;font-weight:bold;margin-top:8px">⚠ HORDE INCOMING!</div>`;
            }

            document.getElementById('ui-overlay').innerHTML = html;
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================

        let vertexCount = 0;

        function addQuad(px, py, size, c0, c1, c2) {
            addRect(px, py, size, size, c0, c1, c2);
        }

        function addRect(px, py, w, h, c0, c1, c2) {
            const i = vertexCount * 2;
            const ci = vertexCount * 3;

            posArray[i] = px;
            posArray[i+1] = py;
            posArray[i+2] = px + w;
            posArray[i+3] = py;
            posArray[i+4] = px + w;
            posArray[i+5] = py + h;
            posArray[i+6] = px;
            posArray[i+7] = py;
            posArray[i+8] = px + w;
            posArray[i+9] = py + h;
            posArray[i+10] = px;
            posArray[i+11] = py + h;

            for (let j = 0; j < 6; j++) {
                colArray[ci + j*3] = c0;
                colArray[ci + j*3 + 1] = c1;
                colArray[ci + j*3 + 2] = c2;
            }

            vertexCount += 6;
        }

        function render(timestamp) {
            gl.clearColor(0.008, 0.008, 0.015, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);

            vertexCount = 0;

            renderAtomGrid();
            renderVoidRifts();
            renderBridges();
            renderBlocks();
            renderSingularityParticles();
            renderLaserBeams();
            renderProjectiles();
            renderShockwaves();
            renderDrones();
            renderAtoms();
            renderAliens();
            renderSidebar();
            renderDraggingBlock();

            if (gameOver) renderGameOver();

            if (vertexCount > 0) {
                gl.useProgram(prog);
                gl.uniform2f(uRes, W, H);
                gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
                gl.bufferData(gl.ARRAY_BUFFER, posArray.subarray(0, vertexCount * 2), gl.DYNAMIC_DRAW);
                gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
                gl.bufferData(gl.ARRAY_BUFFER, colArray.subarray(0, vertexCount * 3), gl.DYNAMIC_DRAW);
                gl.bindVertexArray(vao);
                gl.drawArrays(gl.TRIANGLES, 0, vertexCount);
            }

            updateFps(timestamp);
        }

        function renderAtomGrid() {
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const idx = y * GRID_W + x;
                    const val = atomGrid[idx];
                    if (val < 0.01) continue;

                    const x0 = x * GRID_SIZE, y0 = y * GRID_SIZE;
                    const c = val * 0.18;
                    addQuad(x0, y0, GRID_SIZE, c, c, c);
                }
            }
        }

        function renderVoidRifts() {
            for (const rift of voidRifts) {
                const alpha = rift.life / rift.maxLife;
                const segments = 48;

                // Draw swirling void effect
                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2 + rift.phase;
                    const nextAngle = ((i + 1) / segments) * Math.PI * 2 + rift.phase;

                    const wobble = Math.sin(rift.phase * 2 + i * 0.5) * 20;
                    const radius = rift.radius * (0.9 + 0.1 * Math.sin(angle * 3 + rift.phase * 3)) + wobble;

                    const x1 = rift.x + Math.cos(angle) * radius;
                    const y1 = rift.y + Math.sin(angle) * radius;
                    const x2 = rift.x + Math.cos(nextAngle) * radius;
                    const y2 = rift.y + Math.sin(nextAngle) * radius;

                    const pulseAlpha = alpha * (0.3 + 0.3 * Math.sin(rift.phase * 4 + i * 0.3));
                    const c = C(38, pulseAlpha);

                    addQuad(x1 - B, y1 - B, B * 2, c[0], c[1], c[2]);
                }

                // Draw inner darkness
                const innerRadius = rift.radius * 0.3;
                for (let i = 0; i < 16; i++) {
                    const angle = (i / 16) * Math.PI * 2 + rift.phase * 0.5;
                    const x1 = rift.x + Math.cos(angle) * innerRadius;
                    const y1 = rift.y + Math.sin(angle) * innerRadius;

                    addQuad(x1 - B/2, y1 - B/2, B, 0.02 * alpha, 0.02 * alpha, 0.04 * alpha);
                }
            }
        }

        function renderBridges() {
            for (const bridge of bridges) {
                if (!blocks.includes(bridge.from) || !blocks.includes(bridge.to)) continue;

                for (const sq of bridge.squares) {
                    const pulse = 0.2 + 0.1 * Math.sin(gameTime * 0.04 + sq.phase);
                    const bright = (bridge.from.operational || bridge.from.type === 'energy' || bridge.from.type === 'core') ? 0.6 + pulse : 0.2;
                    const c = C(sq.c, bright);

                    addQuad(sq.x - B/2, sq.y - B/2, B, c[0], c[1], c[2]);
                }
            }
        }

        function renderBlocks() {
            for (const b of blocks) {
                const def = BLOCK_TYPES[b.type];

                let bright = b.operational ? 1.0 : (b.powered ? 0.55 : 0.18);
                const needsEnergy = (def.energyCost > 0) && !b.powered;
                const pulse = b.animPulse || 0;

                for (const sq of def.squares) {
                    let [rx, ry] = rotateCoord(sq.x, sq.y, b.rotation);

                    const sqPhase = (sq.x * 127 + sq.y * 311 + b.animOffset) * 0.01;
                    const animPhase = gameTime * 0.03 + sqPhase;
                    const breathe = b.operational ? Math.sin(animPhase) * 0.15 : 0;

                    const px = b.x + rx * B + breathe;
                    const py = b.y + ry * B + breathe;

                    let c = C(sq.c, bright + pulse * 0.3);

                    // Singularity special rendering with animated lights
                    if (b.type === 'singularity') {
                        const chargePulse = b.chargeLevel * 0.8;
                        const purpleGlow = sq.c >= 32 && sq.c <= 37;
                        const coreGlow = sq.c === 8;

                        if (coreGlow && b.operational) {
                            // Core pulses brighter when charging
                            const corePulse = 0.9 + 0.1 * Math.sin(gameTime * 0.15) + chargePulse;
                            c = C(sq.c, corePulse);
                        } else if (purpleGlow && b.operational) {
                            // Energy rings swirl with light
                            const swirlPhase = gameTime * 0.1 + (sq.x * 0.5 + sq.y * 0.3);
                            const swirl = Math.sin(swirlPhase) * 0.3;
                            c = C(sq.c, bright + pulse * 0.5 + chargePulse + swirl);
                        }
                    }

                    if (needsEnergy) {
                        c = [c[0] * 0.5 + 0.35, c[1] * 0.25, c[2] * 0.25];
                    }

                    addQuad(px, py, B, c[0], c[1], c[2]);
                }

                // Render singularity range indicator when operational
                if (b.type === 'singularity' && b.operational) {
                    const range = def.range;
                    const segments = 48;

                    // Draw swirling energy tendrils around the singularity
                    for (let i = 0; i < segments; i++) {
                        const angle = (i / segments) * Math.PI * 2 + gameTime * 0.02;
                        const nextAngle = ((i + 1) / segments) * Math.PI * 2 + gameTime * 0.02;

                        // Multiple layers of tendrils
                        for (let layer = 0; layer < 3; layer++) {
                            const layerOffset = layer * 0.3;
                            const layerRange = range * (0.3 + layer * 0.25);

                            const wobble = Math.sin(gameTime * 0.05 + i * 0.4 + layer) * 30;
                            const r1 = layerRange + wobble;
                            const r2 = layerRange + Math.sin(gameTime * 0.05 + (i + 1) * 0.4 + layer) * 30;

                            const x1 = b.x + Math.cos(angle + layerOffset) * r1;
                            const y1 = b.y + Math.sin(angle + layerOffset) * r1;
                            const x2 = b.x + Math.cos(nextAngle + layerOffset) * r2;
                            const y2 = b.y + Math.sin(nextAngle + layerOffset) * r2;

                            const pulseVal = 0.1 + 0.08 * Math.sin(gameTime * 0.08 + i * 0.2 + layer);
                            const c = C(35 - layer, pulseVal);

                            addQuad(x1 - B/2, y1 - B/2, B, c[0], c[1], c[2]);
                        }
                    }
                }
            }
        }

        function renderSingularityParticles() {
            for (const p of singularityParticles) {
                const lifeRatio = p.life / p.maxLife;
                const alpha = p.brightness * lifeRatio;

                // Particles glow with purple/white color
                const colorIdx = alpha > 0.7 ? 8 : (alpha > 0.5 ? 32 : 33);
                const c = C(colorIdx, alpha);

                const size = B * p.size;
                addQuad(p.x - size/2, p.y - size/2, size, c[0], c[1], c[2]);

                // Add glow effect
                if (alpha > 0.5) {
                    const glowSize = size * 1.5;
                    const gc = C(32, alpha * 0.3);
                    addQuad(p.x - glowSize/2, p.y - glowSize/2, glowSize, gc[0], gc[1], gc[2]);
                }
            }
        }

        function renderLaserBeams() {
            for (const b of blocks) {
                if (b.type === 'laser' && b.laserTarget && aliens.includes(b.laserTarget)) {
                    const dx = b.laserTarget.x - b.x;
                    const dy = b.laserTarget.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    const steps = Math.floor(dist / B);

                    for (let i = 0; i < steps; i++) {
                        const t = i / steps;
                        const px = b.x + dx * t - B/2;
                        const py = b.y + dy * t - B/2;
                        const alpha = 0.8 - t * 0.4;
                        const flicker = Math.sin(gameTime * 0.3 + i * 0.35) * 0.1;
                        const c = C(40, alpha + flicker);

                        addQuad(px, py, B, c[0], c[1], c[2]);
                    }
                }
            }

            for (const b of blocks) {
                b.laserTarget = null;
            }
        }

        function renderProjectiles() {
            for (const p of projectiles) {
                const flicker = Math.sin(gameTime * 0.35 + p.x) * 0.1;
                const c = C(p.color, 1.0 + flicker);

                addQuad(p.x - B/2, p.y - B/2, B, c[0], c[1], c[2]);
            }
        }

        function renderShockwaves() {
            for (const sw of shockwaves) {
                if (sw.type === 'singularity') {
                    // Singularity shockwave - more dramatic effect
                    const segments = 64;
                    const innerRadius = Math.max(0, sw.radius - 25);
                    const outerRadius = sw.radius + 25;

                    // Multiple expanding rings
                    for (let ring = 0; ring < 3; ring++) {
                        const ringRadius = sw.radius * (0.6 + ring * 0.2);
                        const ringAlpha = sw.alpha * (1 - ring * 0.25);

                        for (let i = 0; i < segments; i++) {
                            const angle = (i / segments) * Math.PI * 2;
                            const wobble = Math.sin(gameTime * 0.15 + i * 0.4 + ring) * 15;
                            const r = ringRadius + wobble;

                            const x1 = sw.x + Math.cos(angle) * r;
                            const y1 = sw.y + Math.sin(angle) * r;

                            // Color shifts from white to purple
                            const colorShift = ring / 3;
                            const baseAlpha = ringAlpha * (0.6 + 0.4 * Math.sin(gameTime * 0.2 + i * 0.5));

                            if (colorShift < 0.3) {
                                const c = C(8, baseAlpha * 0.8);
                                addQuad(x1 - B, y1 - B, B * 2, c[0], c[1], c[2]);
                            } else {
                                const c = C(32 + ring, baseAlpha * 0.7);
                                addQuad(x1 - B, y1 - B, B * 2, c[0], c[1], c[2]);
                            }
                        }
                    }

                    // Central bright flash
                    if (sw.life > 60) {
                        const flashAlpha = (sw.life - 60) / 30;
                        const flashRadius = 50 + (90 - sw.life) * 2;
                        for (let i = 0; i < 16; i++) {
                            const angle = (i / 16) * Math.PI * 2;
                            const x1 = sw.x + Math.cos(angle) * flashRadius;
                            const y1 = sw.y + Math.sin(angle) * flashRadius;
                            const c = C(8, flashAlpha);
                            addQuad(x1 - B, y1 - B, B * 2, c[0], c[1], c[2]);
                        }
                    }
                } else {
                    // Normal shockwave
                    const segments = 48;
                    for (let i = 0; i < segments; i++) {
                        const angle = (i / segments) * Math.PI * 2;
                        const x1 = sw.x + Math.cos(angle) * sw.radius;
                        const y1 = sw.y + Math.sin(angle) * sw.radius;

                        const alpha = sw.alpha * (0.8 + 0.2 * Math.sin(gameTime * 0.2 + i * 0.5));
                        const c = C(32, alpha);

                        addQuad(x1 - B, y1 - B, B * 2, c[0], c[1], c[2]);
                    }
                }
            }
        }

        function renderDrones() {
            for (const d of drones) {
                const flicker = Math.sin(gameTime * 0.15 + d.x + d.y) * 0.1;
                const c = (d.cargo > 0) ? C(35, 0.85 + flicker) : C(34, 0.65 + flicker);

                addQuad(d.x - B/2, d.y - B/2, B, c[0], c[1], c[2]);
            }
        }

        function renderAtoms() {
            for (const a of atoms) {
                const flicker = 0.5 + 0.5 * Math.sin(gameTime * 0.08 + a.phase);
                const c = C(a.color || 57, flicker * 0.6);

                addQuad(a.x - B/2, a.y - B/2, B, c[0], c[1], c[2]);
            }
        }

        function renderAliens() {
            for (const a of aliens) {
                const size = a.size;
                const count = Math.floor(4 + size * 6);
                const spread = 1.0 + size * 0.7;
                const seed = a.seed || (a.x * 100 + a.y * 10);

                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const wobble = Math.sin(a.phase + i * 0.5) * 2;
                    const r = spread * B * (0.4 + 0.6 * Math.sin(seed + i * 2.0));

                    const px = a.x + Math.cos(angle + Math.sin(gameTime * 0.02 + i) * 0.3) * r + wobble - B/2;
                    const py = a.y + Math.sin(angle + Math.sin(gameTime * 0.02 + i) * 0.3) * r + wobble - B/2;

                    const cIdx = 48 + (i % 8);
                    const pulse = 0.7 + 0.3 * Math.sin(a.phase + i * 0.4);
                    const c = C(cIdx, pulse);

                    addQuad(px, py, B, c[0], c[1], c[2]);
                }
            }
        }

        function renderSidebar() {
            const sbX = W - SIDEBAR_W;
            addRect(sbX, 0, W - sbX, H, 0.015, 0.018, 0.025);
            addRect(sbX, 0, 2, H, 0.1, 0.12, 0.15);

            const scale = isMobile ? 0.30 : 0.38;

            for (const ui of uiBlocks) {
                const def = BLOCK_TYPES[ui.type];
                const bx = ui.x + (ui.w / 2);
                const by = ui.y + (isMobile ? 18 : 25);

                const affordable = canAfford(def.cost);

                if ((hoveredUI === ui || (draggingBlock && draggingBlock.type === ui.type)) && affordable) {
                    if (ui.type === 'singularity') {
                        addRect(ui.x - 2, ui.y - 2, ui.w + 4, ui.h + 4, 0.25, 0.15, 0.35);
                    } else {
                        addRect(ui.x - 2, ui.y - 2, ui.w + 4, ui.h + 4, 0.2, 0.25, 0.35);
                    }
                }

                const baseBright = affordable ? 0.8 : 0.25;

                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const sq of def.squares) {
                    if (sq.x < minX) minX = sq.x;
                    if (sq.x > maxX) maxX = sq.x;
                    if (sq.y < minY) minY = sq.y;
                    if (sq.y > maxY) maxY = sq.y;
                }

                const offsetX = -(minX + maxX) / 2;
                const offsetY = -(minY + maxY) / 2;
                const scaledB = B * scale;

                for (const sq of def.squares) {
                    const px = bx + (sq.x + offsetX) * scaledB;
                    const py = by + (sq.y + offsetY) * scaledB;

                    let c = C(sq.c, baseBright);

                    // Special animated glow for singularity when affordable
                    if (ui.type === 'singularity' && affordable) {
                        if (sq.c >= 32 && sq.c <= 37) {
                            const pulse = 0.85 + 0.15 * Math.sin(gameTime * 0.1 + sq.x * 0.2 + sq.y * 0.2);
                            c = C(sq.c, pulse);
                        } else if (sq.c === 8) {
                            const corePulse = 0.9 + 0.1 * Math.sin(gameTime * 0.15);
                            c = C(sq.c, corePulse);
                        }
                    }

                    if (!affordable) {
                        addQuad(px, py, scaledB, c[0] * 0.3, c[1] * 0.3, c[2] * 0.3);
                    } else {
                        addQuad(px, py, scaledB, c[0], c[1], c[2]);
                    }
                }
            }
        }

        function renderDraggingBlock() {
            if (!draggingBlock) return;

            const def = BLOCK_TYPES[draggingBlock.type];

            let baseBright;
            if (!draggingBlock.canPlace) {
                baseBright = 0.15;
            } else if (draggingBlock.needsMoreEnergy) {
                baseBright = 0.35;
            } else {
                baseBright = 0.7;
            }

            const needsEnergy = draggingBlock.needsMoreEnergy;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const sq of def.squares) {
                if (sq.x < minX) minX = sq.x;
                if (sq.x > maxX) maxX = sq.x;
                if (sq.y < minY) minY = sq.y;
                if (sq.y > maxY) maxY = sq.y;
            }

            const offsetX = -(minX + maxX) / 2;
            const offsetY = -(minY + maxY) / 2;
            const scale = isMobile ? 0.45 : 0.55;
            const scaledB = B * scale;

            for (const sq of def.squares) {
                const px = draggingBlock.x + (sq.x + offsetX) * scaledB;
                const py = draggingBlock.y + (sq.y + offsetY) * scaledB;

                let c = C(sq.c, baseBright);
                if (needsEnergy) {
                    c = [c[0] * 0.45 + 0.30, c[1] * 0.20, c[2] * 0.20];
                }

                // Special purple glow for singularity
                if (draggingBlock.type === 'singularity' && draggingBlock.canPlace) {
                    if (sq.c >= 32 && sq.c <= 37) {
                        const pulse = 0.7 + 0.2 * Math.sin(gameTime * 0.12);
                        c = C(sq.c, pulse);
                    }
                }

                addQuad(px, py, scaledB, c[0], c[1], c[2]);
            }

            // Preview bridge
            if (draggingBlock.nearestBlock && draggingBlock.canPlace) {
                const nb = draggingBlock.nearestBlock;
                const dx = nb.x - draggingBlock.x;
                const dy = nb.y - draggingBlock.y;
                const dist = Math.hypot(dx, dy);
                const steps = Math.floor(dist / 8);

                for (let i = 1; i < steps; i++) {
                    const t = i / steps;
                    const px = draggingBlock.x + dx * t - B/2;
                    const py = draggingBlock.y + dy * t - B/2;
                    const alpha = 0.3 + Math.sin(gameTime * 0.08 + i * 0.25) * 0.15;
                    const c = C(60, alpha);

                    addQuad(px, py, B, c[0], c[1], c[2]);
                }
            }
        }

        function renderGameOver() {
            const pulse = 0.2 + 0.12 * Math.sin(gameTime * 0.05);
            addRect(0, 0, W, H, 0.15 * pulse, 0.04, 0.04);
        }

        // ============================================================
        // RESIZE HANDLER
        // ============================================================

        function handleResize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            gl.viewport(0, 0, W, H);

            SIDEBAR_W = getSidebarWidth();

            GRID_W = Math.ceil(W / GRID_SIZE);
            GRID_H = Math.ceil(H / GRID_SIZE);
            atomGrid = new Float32Array(GRID_W * GRID_H);
            initAtomGrid();
            initUIBlocks();
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 100);
        });

        // ============================================================
        // INIT AND GAME LOOP
        // ============================================================

        initAtomGrid();
        initUIBlocks();
        initCore();
        updateUI();

        function gameLoop(timestamp) {
            update();
            render(timestamp);
            requestAnimationFrame(gameLoop);
        }

        gameLoop(0);

    </script>
</body>
</html>
